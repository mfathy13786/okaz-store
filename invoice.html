<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فاتورة الطلب</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body { font-family: 'Cairo', sans-serif; background: #f8fafc; color: #0f172a; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        * { box-sizing: border-box; }
        
        .btn-controls { display: flex; gap: 10px; width: 100%; max-width: 800px; margin-bottom: 20px; flex-wrap: wrap;}
        .btn { flex: 1; min-width: 150px; padding: 12px; border-radius: 12px; border: none; cursor: pointer; font-weight: 800; font-family: 'Cairo'; font-size: 1em; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.05);}
        .btn-print { background: #3b82f6; color: #fff; }
        .btn-print:hover { background: #2563eb; transform: translateY(-2px);}
        .btn-back { background: #e2e8f0; color: #0f172a; }
        .btn-back:hover { background: #cbd5e1; transform: translateY(-2px);}

        .invoice-box { background: #fff; width: 100%; max-width: 800px; padding: 30px 20px; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); margin-bottom: 30px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #f1f5f9; padding-bottom: 20px; margin-bottom: 20px; flex-wrap: wrap; gap: 15px;}
        .store-name { color: #e67e22; margin: 0; font-size: 1.8em; font-weight: 900; }
        .invoice-details { text-align: left; background: #f8fafc; padding: 10px 15px; border-radius: 10px; border: 1px dashed #cbd5e1; min-width: 140px;}
        
        .customer-info { background: #f8fafc; padding: 15px; border-radius: 12px; margin-bottom: 25px; border: 1px solid #e2e8f0; line-height: 1.8; font-size: 0.95em;}
        .customer-info p { margin: 5px 0;}
        
        .table-responsive { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; min-width: 400px;}
        th { background: #0f172a; color: #fff; padding: 12px; text-align: right; font-size: 0.9em;}
        td { border-bottom: 1px solid #e2e8f0; padding: 12px; text-align: right; font-size: 0.9em;}
        
        .totals { border-top: 2px dashed #cbd5e1; padding-top: 20px; text-align: left; background: #f8fafc; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0;}
        .totals p { margin: 5px 0; color: #475569; font-weight: bold; display: flex; justify-content: space-between;}
        .grand-total { font-size: 1.4em; font-weight: 900; color: #e67e22; margin-top: 15px; padding-top: 15px; border-top: 1px solid #cbd5e1; display: flex; justify-content: space-between; align-items: center;}

        @media print {
            body { background: #fff; padding: 0; }
            .btn-controls { display: none; }
            .invoice-box { box-shadow: none; border: none; padding: 0; max-width: 100%; }
        }
        
        .loading { text-align: center; font-size: 1.2em; color: #e67e22; font-weight: bold; padding: 50px; }
    </style>
</head>
<body>

    <div class="btn-controls" id="controls" style="display: none;">
        <button class="btn btn-back" onclick="window.close()"><i class="fas fa-times"></i> إغلاق</button>
        <button class="btn btn-print" onclick="window.print()"><i class="fas fa-file-pdf"></i> طباعة / حفظ كـ PDF</button>
    </div>

    <div id="content" style="width: 100%; display: flex; justify-content: center;"><div class="loading"><i class="fas fa-spinner fa-spin"></i> جاري جلب الفاتورة...</div></div>

    <script>
        const SUPABASE_URL = 'https://wkfiocqhkspsvqgyjpea.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_l2vgR8Xbt0Csw8W_Slo_1Q_9glKlIoN'; 
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadInvoice() {
            const urlParams = new URLSearchParams(window.location.search);
            const orderId = urlParams.get('id');

            if(!orderId) {
                document.getElementById('content').innerHTML = '<div class="loading" style="color:red;">رقم الطلب غير صحيح!</div>';
                return;
            }

            try {
                let storeName = 'المتجر';
                const { data: setReq } = await supabaseClient.from('store_settings').select('*').eq('setting_key', 'store_name').single();
                if(setReq) storeName = setReq.setting_value;

                const { data: order, error } = await supabaseClient.from('orders').select('*').eq('id', orderId).single();
                if(error) throw error;

                const shortId = `OKZ-${order.id.split('-')[0].toUpperCase()}`;
                const date = new Date(order.created_at).toLocaleString('ar-EG');
                
                let itemsHtml = '';
                if(order.cart_info && order.cart_info.items) {
                    itemsHtml = order.cart_info.items.map((i, index) => {
                        const codeTxt = i.code ? `<br><small style="color:#64748b;">كود: ${i.code}</small>` : '';
                        const details = (i.size || i.color) ? `<br><small style="color:#64748b;">(${i.size||'-'} / ${i.color||'-'})</small>` : '';
                        return `
                        <tr>
                            <td style="text-align: center;">${index + 1}</td>
                            <td><b>${i.title}</b>${details}${codeTxt}</td>
                            <td style="text-align: center; font-weight: bold;">${i.qty}</td>
                            <td style="font-weight: bold; direction: ltr;">${i.price} EGP</td>
                        </tr>`;
                    }).join('');
                }

                const bType = order.customer_building || '-';
                const floor = order.customer_floor || '-';
                const apart = order.customer_apartment || '-';
                const notes = order.customer_landmark || 'لا يوجد';
                const payMethod = (order.cart_info && order.cart_info.payment_method) ? order.cart_info.payment_method : 'غير محدد';

                const html = `
                <div class="invoice-box">
                    <div class="header">
                        <div>
                            <h1 class="store-name">${storeName}</h1>
                            <p style="color:#64748b; margin:5px 0 0;">فاتورة ضريبية مبسطة</p>
                        </div>
                        <div class="invoice-details">
                            <h3 style="margin:0; font-family:monospace; font-size:1.2em;">#${shortId}</h3>
                            <p style="margin:5px 0 0; color:#64748b; font-size:0.85em;">${date}</p>
                        </div>
                    </div>
                    
                    <div class="customer-info">
                        <h3 style="color:#e67e22; margin-top:0; border-bottom:1px solid #e2e8f0; padding-bottom:10px; font-size:1.1em;">بيانات العميل</h3>
                        <p><b>الاسم:</b> ${order.customer_name}</p>
                        <p><b>الهاتف:</b> <span style="font-family:monospace;">${order.customer_phone}</span></p>
                        <p><b>العنوان:</b> ${order.customer_city} - ${order.customer_street.split('|')[0]}</p>
                        <p><b>تفاصيل العقار:</b> ${bType} | دور: ${floor} | شقة: ${apart}</p>
                        <p><b>طريقة الدفع:</b> ${payMethod}</p>
                        <p style="margin-bottom:0;"><b>ملاحظات:</b> ${notes}</p>
                    </div>

                    <div class="table-responsive">
                        <table>
                            <thead>
                                <tr>
                                    <th style="text-align: center; width: 5%;">#</th>
                                    <th>المنتج</th>
                                    <th style="text-align: center; width: 15%;">الكمية</th>
                                    <th style="width: 25%;">السعر</th>
                                </tr>
                            </thead>
                            <tbody>${itemsHtml}</tbody>
                        </table>
                    </div>
                    
                    <div class="totals">
                        <p><span>مجموع المنتجات:</span> <span style="color:#0f172a;">${order.total_items_price} ج.م</span></p>
                        <p><span>مصاريف الشحن:</span> <span style="color:#0f172a;">${order.shipping_cost} ج.م</span></p>
                        <div class="grand-total">
                            <span>الإجمالي المطلوب:</span> <span>${order.grand_total} ج.م</span>
                        </div>
                    </div>
                </div>`;
                
                document.getElementById('content').innerHTML = html;
                document.getElementById('controls').style.display = 'flex';
                // لغينا الطباعة التلقائية، العميل هيشوفها الأول براحته

            } catch(e) {
                document.getElementById('content').innerHTML = '<div class="loading" style="color:red;">حدث خطأ في تحميل الفاتورة!</div>';
            }
        }

        window.onload = loadInvoice;
    </script>
</body>
</html>
