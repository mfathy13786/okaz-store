<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إتمام الطلب - المتجر</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { 
            --primary: #e67e22; 
            --primary-hover: #d67118;
            --bg: #f4f7f9; 
            --surface: #ffffff; 
            --text-main: #1e293b; 
            --text-muted: #64748b; 
            --border: #e2e8f0;
            --input-bg: #f8fafc;
            --danger: #ef4444; 
            --success: #10b981; 
            --info: #3b82f6; 
            --radius-lg: 24px;
            --radius-md: 16px;
            --shadow-soft: 0 10px 40px -10px rgba(0,0,0,0.05);
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent;}
        body { background-color: var(--bg); color: var(--text-main); padding-bottom: 60px; }

        /* 🌟 الإشعارات (Toasts) 🌟 */
        .toast-msg { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); color: #fff; padding: 14px 28px; border-radius: 50px; z-index: 99999; font-weight: 700; box-shadow: 0 10px 25px rgba(0,0,0,0.2); animation: dropDown 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); display: flex; align-items: center; gap: 12px; width: 90%; max-width: 400px; justify-content: center; font-size: 0.95em;}
        @keyframes dropDown { from { top: -60px; opacity: 0; transform: translate(-50%, -20px); } to { top: 20px; opacity: 1; transform: translate(-50%, 0); } }

        /* 🌟 الهيدر 🌟 */
        header { background: var(--surface); padding: 15px 20px; text-align: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,0.02);}
        header h1 { color: var(--primary); font-weight: 900; margin: 0; font-size: 1.6em; cursor: pointer; letter-spacing: -0.5px;}
        
        /* 🌟 التقسيمة العبقرية (Layout) 🌟 */
        .checkout-wrapper { max-width: 1100px; margin: 30px auto; padding: 0 15px; display: flex; flex-wrap: wrap; gap: 30px; align-items: flex-start;}
        
        /* العمود الأيمن (البيانات) */
        .details-section { flex: 1.5; min-width: 320px; background: var(--surface); padding: 35px; border-radius: var(--radius-lg); box-shadow: var(--shadow-soft); border: 1px solid rgba(255,255,255,0.5);}
        /* العمود الأيسر (الفاتورة الثابتة) */
        .summary-section { flex: 1; min-width: 320px; background: var(--surface); padding: 30px; border-radius: var(--radius-lg); box-shadow: var(--shadow-soft); border: 1px solid rgba(255,255,255,0.5); position: sticky; top: 90px;}

        .section-title { font-size: 1.25em; font-weight: 900; border-bottom: 2px solid var(--input-bg); padding-bottom: 15px; margin-bottom: 25px; display: flex; align-items: center; gap: 12px; color: var(--text-main);}
        .section-title i { color: var(--primary); background: rgba(230,126,34,0.1); padding: 10px; border-radius: 12px; font-size: 0.9em;}

        /* 🌟 الحقول (Inputs Trend 2026) 🌟 */
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-weight: 700; margin-bottom: 8px; color: var(--text-muted); font-size: 0.9em;}
        .input-style { width: 100%; padding: 14px 16px; border: 2px solid transparent; border-radius: var(--radius-md); font-family: 'Cairo'; outline: none; background: var(--input-bg); font-size: 0.95em; color: var(--text-main); font-weight: 600; transition: all 0.3s ease; box-shadow: inset 0 0 0 1px var(--border);}
        .input-style:focus { background: var(--surface); box-shadow: inset 0 0 0 2px var(--primary), 0 0 0 4px rgba(230,126,34,0.1);}
        .input-style::placeholder { color: #94a3b8; font-weight: 400;}
        
        .flex-row { display: flex; gap: 15px; } .flex-row > div { flex: 1; }

        /* 🌟 أزرار نوع المبنى (Pills) 🌟 */
        .building-type-group { display: flex; gap: 15px; margin-bottom: 20px; }
        .build-btn { flex: 1; padding: 14px; text-align: center; border: 2px solid var(--border); border-radius: var(--radius-md); cursor: pointer; font-weight: 700; color: var(--text-muted); background: var(--surface); transition: all 0.3s ease; display: flex; justify-content: center; align-items: center; gap: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.01);}
        .build-btn i { font-size: 1.1em; transition: 0.3s;}
        .build-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); box-shadow: 0 8px 15px rgba(230,126,34,0.2); transform: translateY(-2px);}
        .build-btn input { display: none; }

        /* 🌟 الخريطة وزر التحديد 🌟 */
        .map-container { border-radius: var(--radius-md); overflow: hidden; border: 2px solid var(--border); margin-bottom: 15px; position: relative; z-index: 1;}
        #map { height: 220px; width: 100%; }
        .btn-gps { background: #eff6ff; color: var(--info); border: 2px dashed #bfdbfe; padding: 12px; width: 100%; font-weight: 800; font-family: 'Cairo'; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 0.95em; border-radius: var(--radius-md); margin-bottom: 25px; transition: all 0.3s ease;}
        .btn-gps:hover { background: var(--info); color: #fff; border-style: solid; box-shadow: 0 8px 15px rgba(59, 130, 246, 0.2);}

        /* 🌟 سلة المشتريات المصغرة 🌟 */
        .cart-items-wrapper { max-height: 350px; overflow-y: auto; padding-right: 5px; margin-bottom: 20px;}
        .cart-items-wrapper::-webkit-scrollbar { width: 5px; } .cart-items-wrapper::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .cart-item { display: flex; gap: 15px; padding: 15px; border-radius: var(--radius-md); background: var(--input-bg); border: 1px solid var(--border); margin-bottom: 12px; transition: 0.3s;}
        .cart-item:hover { background: var(--surface); box-shadow: 0 5px 15px rgba(0,0,0,0.03); border-color: #cbd5e1;}
        .cart-item img { width: 70px; height: 70px; border-radius: 12px; object-fit: cover; border: 1px solid #e2e8f0; background: #fff;}
        .item-details { flex: 1; display: flex; flex-direction: column; justify-content: center;}
        .item-title { font-weight: 800; color: var(--text-main); font-size: 0.95em; line-height: 1.4; margin-bottom: 4px;}
        .item-meta { font-size: 0.75em; color: var(--text-muted); font-weight: 600;}
        .item-price-row { display: flex; justify-content: space-between; align-items: center; margin-top: auto; padding-top: 8px;}
        .item-price { color: var(--primary); font-weight: 900; font-size: 1.05em;}
        .item-qty { font-size: 0.85em; background: #e2e8f0; color: #475569; padding: 3px 8px; border-radius: 8px; font-weight: 800;}

        /* 🌟 ملخص الفاتورة 🌟 */
        .receipt-box { background: var(--surface); padding: 20px; border-radius: var(--radius-md); border: 2px dashed var(--border); margin-bottom: 20px;}
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 12px; color: var(--text-muted); font-weight: 600; font-size: 0.95em;}
        .summary-row b { color: var(--text-main); font-weight: 800;}
        .summary-total { display: flex; justify-content: space-between; margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--border); font-size: 1.3em; font-weight: 900; color: var(--text-main);}
        .summary-total span:last-child { color: var(--primary); font-size: 1.1em;}

        /* 🌟 زر الإرسال الرئيسي 🌟 */
        .btn-submit { background: var(--success); color: #fff; width: 100%; border: none; padding: 18px; border-radius: var(--radius-md); font-weight: 900; font-size: 1.15em; font-family: 'Cairo'; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; box-shadow: 0 10px 20px rgba(16, 185, 129, 0.25); transition: all 0.3s ease; position: relative; overflow: hidden;}
        .btn-submit::after { content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%; background: linear-gradient(to right, transparent, rgba(255,255,255,0.3), transparent); transform: skewX(-20deg); transition: 0.5s;}
        .btn-submit:hover { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(16, 185, 129, 0.35); background: #0ea5e9; box-shadow: 0 10px 20px rgba(14, 165, 233, 0.25);} /* يتغير للأزرق عند الهوفر */
        .btn-submit:hover::after { left: 150%; }
        .btn-submit:active { transform: scale(0.97); }
        .btn-submit:disabled { background: #94a3b8; box-shadow: none; cursor: not-allowed; transform: none;}

        /* 🌟 شاشة النجاح (Modal Trend) 🌟 */
        .modal-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); z-index: 99999; display: none; align-items: center; justify-content: center; backdrop-filter: blur(8px); padding: 20px; opacity: 0; transition: opacity 0.3s ease;}
        .modal-overlay.show { opacity: 1; }
        .modal-card { background: var(--surface); padding: 40px 30px; border-radius: 30px; text-align: center; max-width: 420px; width: 100%; transform: scale(0.9) translateY(20px); opacity: 0; transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); border: 1px solid rgba(255,255,255,0.5);}
        .modal-overlay.show .modal-card { transform: scale(1) translateY(0); opacity: 1; }
        
        .success-icon { width: 90px; height: 90px; background: rgba(16, 185, 129, 0.1); color: var(--success); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 3.5em; margin: 0 auto 20px; animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards 0.2s; opacity: 0; transform: scale(0);}
        @keyframes popIn { to { opacity: 1; transform: scale(1); } }
        
        .modal-card h2 { color: var(--text-main); font-size: 1.8em; font-weight: 900; margin-bottom: 10px; border: none; padding: 0; justify-content: center;}
        .modal-card p { color: var(--text-muted); font-size: 0.95em; line-height: 1.6; margin-bottom: 25px; padding: 0 10px;}
        
        .order-badge { background: var(--input-bg); border: 2px dashed var(--border); padding: 15px; border-radius: var(--radius-md); display: inline-block; width: 100%; margin-bottom: 25px;}
        .order-badge span { display: block; color: var(--text-muted); font-size: 0.85em; font-weight: 700; margin-bottom: 5px;}
        .order-badge b { color: var(--primary); font-size: 1.4em; font-family: monospace; letter-spacing: 1px;}

        .action-btns { display: flex; flex-direction: column; gap: 12px; }
        .action-btns button, .action-btns a { width: 100%; padding: 16px; border-radius: var(--radius-md); font-weight: 800; font-family: 'Cairo'; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 1em; border: none; text-decoration: none; transition: 0.3s;}
        
        .btn-wa { background: #25D366; color: #fff; box-shadow: 0 8px 20px rgba(37, 211, 102, 0.2); }
        .btn-wa:hover { background: #20bd5a; transform: translateY(-2px); box-shadow: 0 10px 25px rgba(37, 211, 102, 0.3); }
        
        .btn-print { background: var(--input-bg); color: var(--text-main); border: 2px solid var(--border); }
        .btn-print:hover { background: var(--border); color: #000; }
        
        .btn-home { background: transparent; color: var(--text-muted); font-weight: 600;}
        .btn-home:hover { color: var(--text-main); text-decoration: underline;}

        @media (max-width: 768px) {
            .details-section, .summary-section { padding: 25px 20px; }
            .summary-section { position: relative; top: 0; }
        }
    </style>
</head>
<body>

    <header>
        <h1 id="store-title" onclick="window.location.href='index.html'">المتجر</h1>
    </header>

    <div class="checkout-wrapper">
        
        <div class="details-section">
            <h2 class="section-title"><i class="fas fa-map-marked-alt"></i> أين نقوم بتوصيل طلبك؟</h2>
            
            <div class="input-group">
                <label>الاسم بالكامل *</label>
                <input type="text" id="co-name" class="input-style" placeholder="الاسم الثلاثي لضمان دقة التسليم">
            </div>
            
            <div class="flex-row">
                <div class="input-group">
                    <label>رقم الهاتف (للتواصل) *</label>
                    <input type="tel" id="co-phone" class="input-style" placeholder="01xxxxxxxxx">
                </div>
                <div class="input-group">
                    <label>المحافظة *</label>
                    <select id="co-city" class="input-style" onchange="calculateTotals()"><option value="">-- اختر --</option></select>
                </div>
            </div>
            
            <label style="font-weight:700; font-size:0.9em; color:var(--text-muted); margin-bottom:8px; display:block;">تحديد الموقع بدقة (لتسريع وصول المندوب)</label>
            <div class="map-container">
                <div id="map"></div>
            </div>
            <button class="btn-gps" onclick="getUserLocation()"><i class="fas fa-location-crosshairs"></i> التقاط موقعي الحالي تلقائياً</button>
            
            <div class="input-group">
                <label>اسم المنطقة / الشارع تفصيلياً *</label>
                <textarea id="co-street" class="input-style" rows="2" placeholder="اسم الشارع، أقرب معلم معروف، أو رقم المبنى..."></textarea>
            </div>
            
            <label style="font-weight:700; font-size:0.9em; color:var(--text-muted); margin-bottom:10px; display:block;">نوع العقار</label>
            <div class="building-type-group">
                <label class="build-btn active" onclick="setBuildingType(this, 'سكني')">
                    <input type="radio" name="b_type" value="سكني" checked> <i class="fas fa-home"></i> منزل (سكني)
                </label>
                <label class="build-btn" onclick="setBuildingType(this, 'عمل')">
                    <input type="radio" name="b_type" value="عمل"> <i class="fas fa-building"></i> عمل (شركة)
                </label>
            </div>

            <div class="flex-row">
                <div class="input-group">
                    <label>رقم الدور (اختياري)</label>
                    <input type="text" id="co-floor" class="input-style" placeholder="مثال: 3">
                </div>
                <div class="input-group">
                    <label>رقم الشقة/المكتب (اختياري)</label>
                    <input type="text" id="co-apartment" class="input-style" placeholder="مثال: 12">
                </div>
            </div>
            
            <div class="input-group" style="margin-bottom:0;">
                <label>البريد الإلكتروني (اختياري - لاستلام الفاتورة)</label>
                <input type="email" id="co-email" class="input-style" placeholder="example@email.com">
            </div>
            
            <div class="input-group" style="margin-top:20px; display:none;" id="notes-container">
                <label>ملاحظات للمندوب (اختياري)</label>
                <input type="text" id="co-notes" class="input-style" placeholder="مثال: الاتصال قبل الوصول بنصف ساعة">
            </div>
            <button onclick="document.getElementById('notes-container').style.display='block'; this.style.display='none';" style="background:none; border:none; color:var(--info); font-weight:bold; font-family:'Cairo'; cursor:pointer; display:flex; align-items:center; gap:5px; margin-top:5px;"><i class="fas fa-plus-circle"></i> إضافة ملاحظة للمندوب</button>
        </div>

        <div class="summary-section">
            <h2 class="section-title"><i class="fas fa-receipt"></i> ملخص الطلب</h2>
            
            <div class="cart-items-wrapper" id="cart-items-container">
                </div>

            <div class="receipt-box">
                <div class="summary-row"><span>إجمالي المنتجات:</span><b id="sum-subtotal">0 ج.م</b></div>
                <div class="summary-row"><span>مصاريف الشحن:</span><b id="sum-shipping">0 ج.م</b></div>
                <div class="summary-total"><span>الإجمالي المطلوب:</span><span id="sum-grandtotal">0 ج.م</span></div>
            </div>

            <button class="btn-submit" id="btn-submit-order" onclick="submitOrder()">تأكيد وإرسال الطلب <i class="fas fa-arrow-left"></i></button>
            <div style="text-align:center; margin-top:15px; color:var(--text-muted); font-size:0.8em; font-weight:600;"><i class="fas fa-shield-alt" style="color:var(--success);"></i> بياناتك محمية ومشفرة بالكامل</div>
        </div>
    </div>

    <div id="success-modal" class="modal-overlay">
        <div class="modal-card">
            <div class="success-icon"><i class="fas fa-check"></i></div>
            <h2>تم استلام طلبك!</h2>
            <p>شكراً لتسوقك معنا. جاري تجهيز طلبك وسنقوم بالتواصل معك قريباً لتأكيد الشحن.</p>
            
            <div class="order-badge">
                <span>رقم طلبك المرجعي</span>
                <b id="success-order-id">#ORD-XXXX</b>
            </div>

            <div class="action-btns">
                <a href="#" id="wa-link" target="_blank" class="btn-wa"><i class="fab fa-whatsapp" style="font-size:1.3em;"></i> متابعة الطلب عبر واتساب</a>
                <button onclick="printInvoiceFromData()" class="btn-print"><i class="fas fa-file-pdf"></i> عرض وتحميل الفاتورة</button>
                <button onclick="window.location.href='index.html'" class="btn-home">العودة للصفحة الرئيسية</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://wkfiocqhkspsvqgyjpea.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_l2vgR8Xbt0Csw8W_Slo_1Q_9glKlIoN'; 
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let cart = JSON.parse(localStorage.getItem('okaz_cart')) || [];
        let systemSettings = {}; let shippingRules = [];
        let subtotal = 0; let shippingCost = 0; let lastOrder = null;
        let map; let marker; let lat = 30.0444; let lng = 31.2357;

        const fallbackSVG = "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAiIGhlaWdodD0iMTAwIj48cmVjdCB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgZmlsbD0iI2Y4ZmFmYyIvPjx0ZXh0IHg9IjUwJSIgeT0iNTAlIiBkeT0iLjNlbSIgZmlsbD0iIzk0YTNiOCIgZm9udC1zaXplPSIxMiIgZm9udC1mYW1pbHk9InNhbnMtc2VyaWYiIHRleHQtYW5jaG9yPSJtaWRkbGUiPk5vIEltYWdlPC90ZXh0Pjwvc3ZnPg==";

        function showToast(msg, icon='fas fa-info-circle', color='#333') {
            const exist = document.querySelector('.toast-msg'); if(exist) exist.remove();
            const div = document.createElement('div'); div.className = 'toast-msg'; div.style.background = color;
            div.innerHTML = `<i class="${icon}"></i> <span>${msg}</span>`;
            document.body.appendChild(div); setTimeout(() => { if(div) div.remove(); }, 5000);
        }

        async function initCheckout() {
            if(cart.length === 0) { window.location.href='index.html'; return; }
            renderCart(); initMap();
            
            const [setReq, shipReq] = await Promise.all([
                supabaseClient.from('store_settings').select('*'), 
                supabaseClient.from('shipping_rules').select('*').order('city_ar')
            ]);
            
            if(setReq.data) {
                setReq.data.forEach(s => systemSettings[s.setting_key] = s.setting_value);
                document.getElementById('store-title').innerText = systemSettings.store_name || 'المتجر';
                if(systemSettings.theme_color) document.documentElement.style.setProperty('--primary', systemSettings.theme_color);
            }
            
            shippingRules = shipReq.data || [];
            const citySel = document.getElementById('co-city');
            shippingRules.forEach(c => { citySel.innerHTML += `<option value="${c.id}" data-cost="${c.cost}">${c.city_ar}</option>`; });
            
            const { data: { session } } = await supabaseClient.auth.getSession();
            if(session && session.user && session.user.user_metadata) {
                const meta = session.user.user_metadata;
                document.getElementById('co-name').value = meta.full_name || '';
                document.getElementById('co-phone').value = meta.phone || '';
                document.getElementById('co-street').value = meta.address || '';
                document.getElementById('co-email').value = session.user.email || '';
                for(let i=0; i<citySel.options.length; i++) {
                    if(citySel.options[i].text === meta.city) { citySel.selectedIndex = i; break; }
                }
            }
            calculateTotals();
        }

        function initMap() {
            map = L.map('map').setView([lat, lng], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { attribution: '© OpenStreetMap' }).addTo(map);
            
            const customIcon = L.icon({
                iconUrl: 'https://cdn-icons-png.flaticon.com/512/684/684908.png',
                iconSize: [40, 40], iconAnchor: [20, 40]
            });
            marker = L.marker([lat, lng], {icon: customIcon, draggable: true}).addTo(map);
            marker.on('dragend', () => { lat = marker.getLatLng().lat; lng = marker.getLatLng().lng; });
        }

        function getUserLocation() {
            if (navigator.geolocation) {
                showToast("جاري تحديد موقعك بدقة...", "fas fa-satellite-dish fa-spin", "#3b82f6");
                navigator.geolocation.getCurrentPosition((p) => {
                    lat = p.coords.latitude; lng = p.coords.longitude;
                    map.setView([lat, lng], 16); marker.setLatLng([lat, lng]);
                    showToast("تم التقاط موقعك بنجاح", "fas fa-check-circle", "#10b981");
                }, () => { showToast("يرجى تفعيل خيار الـ GPS في متصفحك", "fas fa-exclamation-triangle", "#ef4444"); });
            }
        }

        function setBuildingType(el, v) { document.querySelectorAll('.build-btn').forEach(b=>b.classList.remove('active')); el.classList.add('active'); el.querySelector('input').checked = true;}

        function renderCart() {
            subtotal = 0;
            document.getElementById('cart-items-container').innerHTML = cart.map((i, idx) => {
                subtotal += (i.price * i.qty);
                const meta = (i.size || i.color) ? `<span class="item-meta">${i.size||''} ${i.color||''}</span>` : '';
                return `
                <div class="cart-item">
                    <img src="${i.image}" onerror="this.src='${fallbackSVG}'">
                    <div class="item-details">
                        <div class="item-title">${i.title}</div>
                        ${meta}
                        <div class="item-price-row">
                            <div class="item-price">${i.price} ج.م</div>
                            <div class="item-qty">الكمية: ${i.qty}</div>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function calculateTotals() {
            const citySel = document.getElementById('co-city');
            shippingCost = citySel.selectedIndex > 0 ? parseFloat(citySel.options[citySel.selectedIndex].getAttribute('data-cost')) : 0;
            document.getElementById('sum-subtotal').innerText = `${subtotal} ج.م`;
            document.getElementById('sum-shipping').innerText = `${shippingCost} ج.م`;
            document.getElementById('sum-grandtotal').innerText = `${subtotal + shippingCost} ج.م`;
        }

        async function submitOrder() {
            const name = document.getElementById('co-name').value.trim();
            const phone = document.getElementById('co-phone').value.trim();
            const citySel = document.getElementById('co-city');
            const street = document.getElementById('co-street').value.trim();
            
            if(!name || !phone || citySel.selectedIndex === 0 || !street) {
                return showToast("برجاء إكمال البيانات الأساسية ذات العلامة (*)", "fas fa-exclamation-circle", "#ef4444");
            }

            const btn = document.getElementById('btn-submit-order');
            btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري تأمين وإرسال الطلب...';

            let mapLink = '';
            if(lat !== 30.0444) { mapLink = `http://googleusercontent.com/maps.google.com/q=${lat},${lng}`; }
            const finalStreet = mapLink ? `${street} | الخريطة: ${mapLink}` : street;

            try {
                // ⚠️ الكود البرمجي لم يتم لمسه، مطابق لقاعدة بياناتك 100% ⚠️
                const orderData = {
                    customer_name: name,
                    customer_phone: phone,
                    customer_city: citySel.options[citySel.selectedIndex].text,
                    customer_street: finalStreet,
                    customer_email: document.getElementById('co-email').value || null,
                    customer_building: document.querySelector('.build-btn.active').innerText.trim(),
                    customer_floor: document.getElementById('co-floor').value || null,
                    customer_apartment: document.getElementById('co-apartment').value || null,
                    customer_landmark: document.getElementById('co-notes').value || null,
                    total_items_price: parseFloat(subtotal), 
                    shipping_cost: parseFloat(shippingCost), 
                    discount_amount: 0,
                    grand_total: parseFloat(subtotal + shippingCost),
                    status: 'قيد المراجعة', 
                    cart_info: { items: cart }
                };

                const { data, error } = await supabaseClient.from('orders').insert([orderData]).select().single();
                if(error) throw error;
                
                lastOrder = data; 
                const shortId = data.id.split('-')[0].toUpperCase();

                // 🌟 رسالة الواتساب 🌟
                let waMsg = `مرحباً، أود تأكيد طلبي رقم *#ORD-${shortId}*%0A%0A`;
                waMsg += `👤 الاسم: ${name}%0A📞 الموبايل: ${phone}%0A📍 العنوان: ${orderData.customer_city} - ${street}%0A`;
                if(mapLink) waMsg += `🗺️ الخريطة: ${mapLink}%0A`;
                waMsg += `%0A🛒 *المنتجات:*%0A`;
                cart.forEach(i => { waMsg += `- ${i.title} (${i.size||''} ${i.color||''}) x${i.qty}%0A`; });
                waMsg += `%0A💰 *الإجمالي المطلوب: ${orderData.grand_total} ج.م*`;
                
                document.getElementById('wa-link').href = `https://wa.me/${systemSettings.social_whatsapp}?text=${waMsg}`;
                
                localStorage.removeItem('okaz_cart');
                document.getElementById('success-order-id').innerText = `#ORD-${shortId}`;
                
                const modal = document.getElementById('success-modal');
                modal.style.display = 'flex';
                setTimeout(() => modal.classList.add('show'), 50);

            } catch(e) {
                showToast("حدث خطأ من الخادم: " + e.message, "fas fa-times", "#ef4444");
                btn.disabled = false; btn.innerHTML = 'تأكيد وإرسال الطلب <i class="fas fa-arrow-left"></i>';
            }
        }

        // 🖨️ طباعة الفاتورة بتصميم شركات (A4 Modern Invoice) 🖨️
        function printInvoiceFromData() {
            if(!lastOrder) return;
            const storeName = systemSettings.store_name || 'المتجر';
            const shortId = lastOrder.id.split('-')[0].toUpperCase();
            const date = new Date(lastOrder.created_at).toLocaleString('ar-EG', { dateStyle: 'full', timeStyle: 'short' });
            
            let itemsHtml = cart.map((i, index) => `
                <tr style="border-bottom: 1px solid #e2e8f0;">
                    <td style="padding:15px; text-align:center; color:#64748b;">${index + 1}</td>
                    <td style="padding:15px; text-align:right;">
                        <b style="color:#0f172a; font-size:1.1em;">${i.title}</b><br>
                        <span style="color:#64748b; font-size:0.9em;">المقاس: ${i.size||'-'} | اللون: ${i.color||'-'}</span>
                    </td>
                    <td style="padding:15px; text-align:center; font-weight:bold; color:#334155;">${i.qty}</td>
                    <td style="padding:15px; text-align:left; color:#1e293b; font-weight:900;">${i.price} ج.م</td>
                </tr>
            `).join('');
            
            const html = `
            <div style="max-width:800px; margin:0 auto; direction:rtl; text-align:right; font-family:'Cairo'; padding:40px; background:#fff; color:#0f172a;">
                
                <div style="display:flex; justify-content:space-between; align-items:flex-start; border-bottom:2px solid #f1f5f9; padding-bottom:30px; margin-bottom:30px;">
                    <div>
                        <h1 style="color:#e67e22; margin:0; font-size:2.8em; font-weight:900;">${storeName}</h1>
                        <div style="color:#64748b; margin-top:5px; font-weight:600;">فاتورة ضريبية مبسطة / Invoice</div>
                    </div>
                    <div style="text-align:left; background:#f8fafc; padding:15px 25px; border-radius:16px; border:1px dashed #cbd5e1;">
                        <h3 style="margin:0; color:#0f172a; font-family:monospace; font-size:1.4em;">#ORD-${shortId}</h3>
                        <div style="color:#64748b; margin-top:5px; font-size:0.9em;">${date}</div>
                    </div>
                </div>
                
                <div style="margin-bottom:35px;">
                    <h3 style="color:#e67e22; margin-bottom:15px; font-size:1.2em;">معلومات العميل (Billed To)</h3>
                    <div style="display:flex; flex-wrap:wrap; gap:20px; background:#f8fafc; padding:25px; border-radius:16px; border:1px solid #f1f5f9;">
                        <div style="flex:1; min-width:200px;"><span style="color:#64748b; font-size:0.85em; display:block; margin-bottom:4px;">الاسم بالكامل</span><b style="font-size:1.1em;">${lastOrder.customer_name}</b></div>
                        <div style="flex:1; min-width:200px;"><span style="color:#64748b; font-size:0.85em; display:block; margin-bottom:4px;">رقم الهاتف</span><b style="font-size:1.1em; font-family:monospace;">${lastOrder.customer_phone}</b></div>
                        <div style="flex:2; min-width:300px;"><span style="color:#64748b; font-size:0.85em; display:block; margin-bottom:4px;">العنوان تفصيلياً</span><b style="font-size:1.1em; line-height:1.5;">${lastOrder.customer_city} - ${lastOrder.customer_street.split('|')[0]}</b></div>
                    </div>
                </div>

                <table style="width:100%; border-collapse:collapse; margin-bottom:40px;">
                    <thead>
                        <tr style="background:#0f172a; color:#fff;">
                            <th style="padding:15px; text-align:center; border-radius:0 12px 12px 0; width:5%;">#</th>
                            <th style="padding:15px; text-align:right;">وصف المنتج (Item)</th>
                            <th style="padding:15px; text-align:center; width:15%;">الكمية (Qty)</th>
                            <th style="padding:15px; text-align:left; border-radius:12px 0 0 0; width:20%;">سعر الوحدة (Price)</th>
                        </tr>
                    </thead>
                    <tbody>${itemsHtml}</tbody>
                </table>
                
                <div style="display:flex; justify-content:flex-end;">
                    <div style="width:350px; background:#f8fafc; padding:25px; border-radius:20px; border:1px solid #e2e8f0;">
                        <div style="display:flex; justify-content:space-between; margin-bottom:12px; color:#475569; font-weight:600; font-size:1.1em;"><span>المجموع الفرعي:</span> <span>${lastOrder.total_items_price} ج.م</span></div>
                        <div style="display:flex; justify-content:space-between; margin-bottom:12px; color:#475569; font-weight:600; font-size:1.1em;"><span>مصاريف الشحن:</span> <span>${lastOrder.shipping_cost} ج.م</span></div>
                        <div style="display:flex; justify-content:space-between; margin-top:20px; padding-top:20px; border-top:2px dashed #cbd5e1; font-size:1.6em; font-weight:900; color:#0f172a;">
                            <span>الإجمالي الكلي:</span> <span style="color:#e67e22;">${lastOrder.grand_total} ج.م</span>
                        </div>
                    </div>
                </div>
                
                <div style="text-align:center; margin-top:60px; color:#94a3b8; font-size:1em; border-top:1px solid #f1f5f9; padding-top:30px; font-weight:600;">
                    شكراً لاختياركم متجر ${storeName}. يسعدنا خدمتكم دائماً.
                </div>
            </div>`;
            
            const win = window.open('', '_blank');
            win.document.write(`<html><head><title>فاتورة #ORD-${shortId}</title><link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet"><style>body{margin:0; padding:0; background:#f5f6fa;} @media print { body{background:#fff;} }</style></head><body>${html}</body></html>`);
            win.document.close(); 
            setTimeout(() => { win.print(); }, 1000); // ننتظر ثانية لتحميل الخطوط
        }

        initCheckout();
    </script>
</body>
</html>
