<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إتمام الطلب - سوق عكاز</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #e67e22; --bg: #f4f7f6; --text: #2d3436; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); padding: 20px; color: var(--text); }
        .checkout-container { max-width: 600px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h2 { text-align: center; color: var(--primary); font-weight: 900; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 0.9em; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #eee; border-radius: 10px; font-family: 'Cairo'; outline: none; background: #f9f9f9; }
        input:focus { border-color: var(--primary); background: #fff; }
        .order-summary { background: #fff9f4; padding: 15px; border-radius: 15px; margin: 20px 0; border: 1px dashed var(--primary); }
        .summary-item { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.9em; }
        .total-price { border-top: 1px solid #eee; padding-top: 10px; margin-top: 10px; font-weight: 900; font-size: 1.2em; color: var(--primary); display: flex; justify-content: space-between; }
        .btn-confirm { background: var(--primary); color: #fff; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: 900; font-size: 1.1em; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; }
        .btn-confirm:disabled { background: #ccc; }
        .back-link { display: block; text-align: center; margin-top: 15px; color: var(--text); text-decoration: none; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="checkout-container">
    <h2><i class="fas fa-shopping-check"></i> تأكيد طلبك</h2>
    
    <div class="form-group">
        <label>الاسم بالكامل</label>
        <input type="text" id="cust-name" placeholder="اكتب اسمك الثلاثي">
    </div>
    
    <div class="form-group">
        <label>رقم الواتساب</label>
        <input type="tel" id="cust-phone" placeholder="01xxxxxxxxx">
    </div>

    <div class="form-group">
        <label>عنوان التوصيل بالتفصيل</label>
        <textarea id="cust-address" rows="3" placeholder="المحافظة، المنطقة، اسم الشارع، رقم المنزل"></textarea>
    </div>

    <div class="order-summary">
        <div id="summary-items"></div>
        <div class="total-price">
            <span>إجمالي المبلغ:</span>
            <span id="summary-total">0 ج.م</span>
        </div>
    </div>

    <button class="btn-confirm" id="confirm-order-btn" onclick="confirmOrder()">
        تأكيد الطلب وإرسال عبر واتساب <i class="fab fa-whatsapp"></i>
    </button>
    
    <a href="index.html" class="back-link">العودة للسلة</a>
</div>

<script>
    const SUPABASE_URL = 'https://wkfiocqhkspsvqgyjpea.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_l2vgR8Xbt0Csw8W_Slo_1Q_9glKlIoN'; 
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let cart = JSON.parse(localStorage.getItem('okaz_cart')) || [];
    let userEmail = "";
    let userId = null;

    async function initCheckout() {
        if(cart.length === 0) {
            alert("سلتك فارغة!");
            window.location.href = 'index.html';
            return;
        }

        const { data: { session } } = await supabaseClient.auth.getSession();
        if(session) {
            document.getElementById('cust-name').value = session.user.user_metadata.full_name || session.user.user_metadata.name || "";
            userEmail = session.user.email;
            userId = session.user.id;
        }

        renderSummary();
    }

    function renderSummary() {
        const cont = document.getElementById('summary-items');
        let total = 0;
        cont.innerHTML = cart.map(item => {
            total += (item.price * item.qty);
            return `<div class="summary-item">
                <span>${item.qty} x ${item.title} (${item.size || ''})</span>
                <span>${item.price * item.qty} ج.م</span>
            </div>`;
        }).join('');
        document.getElementById('summary-total').innerText = total + " ج.م";
    }

    async function confirmOrder() {
        const name = document.getElementById('cust-name').value.trim();
        const phone = document.getElementById('cust-phone').value.trim();
        const address = document.getElementById('cust-address').value.trim();
        const btn = document.getElementById('confirm-order-btn');

        if(!name || !phone || !address) {
            alert("برجاء ملء جميع البيانات لإتمام الشحن.");
            return;
        }

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري معالجة الطلب...';

        const total = cart.reduce((sum, i) => sum + (i.price * i.qty), 0);

        // 1. تسجيل الطلب في قاعدة البيانات
        const { data, error } = await supabaseClient.from('orders').insert([{
            customer_name: name,
            customer_phone: phone,
            customer_email: userEmail,
            address: address,
            items: cart,
            total_price: total,
            user_id: userId
        }]);

        if(error) {
            alert("حدث خطأ في تسجيل الطلب: " + error.message);
            btn.disabled = false;
            return;
        }

        // 2. تجهيز رسالة الواتساب الاحترافية
        let message = `طلب جديد من متجر عكاز 🛒\n\n`;
        message += `👤 العميل: ${name}\n`;
        message += `📞 تليفون: ${phone}\n`;
        message += `📍 العنوان: ${address}\n`;
        message += `----------\nالمنتجات:\n`;
        cart.forEach(item => {
            message += `- ${item.title} | مقاس: ${item.size || 'N/A'} | كمية: ${item.qty} | سعر: ${item.price} ج.م\n`;
        });
        message += `----------\n💰 الإجمالي: ${total} ج.م`;

        // رقم واتساب م/ محمد فتحي
        const merchantPhone = "201090921815"; 
        const whatsappUrl = `https://wa.me/${merchantPhone}?text=${encodeURIComponent(message)}`;

        // 3. تفريغ السلة وتوجيه العميل
        localStorage.removeItem('okaz_cart');
        alert("تم تسجيل طلبك بنجاح! سيتم فتح واتساب الآن لإرسال تفاصيل الطلب للمدير التقني.");
        window.location.href = whatsappUrl;
    }

    initCheckout();
</script>

</body>
</html>
