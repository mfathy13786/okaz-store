<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الإدارة - المتجر القياسي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <style>
        :root { --primary: #2c3e50; --accent: #e67e22; --bg: #f4f7f6; --success: #27ae60; --danger: #e74c3c; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; display: flex; color: #333; }
        
        /* شريط جانبي */
        .sidebar { width: 250px; background: var(--primary); color: #fff; min-height: 100vh; padding: 20px 0; position: fixed; right: 0; top: 0; }
        .sidebar h2 { text-align: center; font-weight: 900; margin-bottom: 30px; color: var(--accent); }
        .nav-link { display: block; padding: 15px 25px; color: #ecf0f1; text-decoration: none; font-weight: bold; transition: 0.3s; }
        .nav-link:hover, .nav-link.active { background: rgba(255,255,255,0.1); border-right: 4px solid var(--accent); }
        .nav-link i { margin-left: 10px; width: 20px; text-align: center; }

        /* المحتوى الرئيسي */
        .main-content { margin-right: 250px; padding: 30px; width: calc(100% - 250px); }
        .header-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .header-actions h1 { margin: 0; font-size: 1.5em; color: var(--primary); }
        
        .btn { padding: 10px 20px; border: none; border-radius: 8px; font-family: 'Cairo'; font-weight: bold; cursor: pointer; color: #fff; display: inline-flex; align-items: center; gap: 8px; transition: 0.2s; }
        .btn-export { background: #3498db; }
        .btn-import { background: var(--success); }
        .btn-import:hover { background: #219150; }
        .btn-export:hover { background: #2980b9; }

        /* جدول المنتجات */
        .table-container { background: #fff; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: right; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; font-weight: 900; color: var(--primary); }
        tr:hover { background: #fdfdfd; }
        
        .prod-img { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; border: 1px solid #ddd; }
        
        /* زر الإظهار والإخفاء (Toggle) */
        .toggle-switch { position: relative; display: inline-block; width: 50px; height: 24px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--success); }
        input:checked + .slider:before { transform: translateX(26px); }

        #upload-loader { display: none; margin-right: 15px; color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2><i class="fas fa-tshirt"></i> إدارة المتجر</h2>
        <a href="#" class="nav-link active"><i class="fas fa-box"></i> المنتجات</a>
        <a href="#" class="nav-link" onclick="alert('هنبرمجها الخطوة الجاية!')"><i class="fas fa-shopping-cart"></i> الطلبات</a>
        <a href="#" class="nav-link" onclick="alert('هنبرمجها الخطوة الجاية!')"><i class="fas fa-users"></i> العملاء</a>
        <a href="index.html" class="nav-link" target="_blank"><i class="fas fa-external-link-alt"></i> زيارة المتجر</a>
    </div>

    <div class="main-content">
        <div class="header-actions">
            <h1>إدارة المنتجات و المخزون</h1>
            <div>
                <span id="upload-loader"><i class="fas fa-spinner fa-spin"></i> جاري الرفع...</span>
                <button class="btn btn-export" onclick="exportToCSV()"><i class="fas fa-download"></i> تصدير (CSV)</button>
                <input type="file" id="csv-file" accept=".csv" style="display: none;" onchange="importFromCSV(event)">
                <button class="btn btn-import" onclick="document.getElementById('csv-file').click()"><i class="fas fa-upload"></i> استيراد (CSV)</button>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>الصورة</th>
                        <th>اسم المنتج</th>
                        <th>السعر</th>
                        <th>الموسم</th>
                        <th>الفئة</th>
                        <th>حالة الظهور</th>
                        <th>إجراء</th>
                    </tr>
                </thead>
                <tbody id="admin-products-list">
                    <tr><td colspan="7" style="text-align:center;">جاري تحميل المنتجات...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://wkfiocqhkspsvqgyjpea.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_l2vgR8Xbt0Csw8W_Slo_1Q_9glKlIoN'; 
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let allProducts = [];

        // 1. جلب وعرض المنتجات
        async function fetchAdminProducts() {
            const { data, error } = await supabaseClient.from('products').select('*').order('created_at', { ascending: false });
            if (error) return alert("خطأ في جلب البيانات: " + error.message);
            
            allProducts = data || [];
            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('admin-products-list');
            if(allProducts.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; color:#888;">لا توجد منتجات. استخدم زر الاستيراد لرفع بضاعتك!</td></tr>';
                return;
            }

            tbody.innerHTML = allProducts.map(p => `
                <tr>
                    <td><img src="${p.image || 'https://via.placeholder.com/50'}" class="prod-img"></td>
                    <td><b>${p.title_ar || 'بدون اسم'}</b><br><small style="color:#888;">${p.title_en || ''}</small></td>
                    <td style="color:var(--success); font-weight:bold;">${p.price} ج.م</td>
                    <td><span style="background:#eee; padding:3px 8px; border-radius:5px; font-size:0.85em;">${p.season || 'الكل'}</span></td>
                    <td>${p.gender || 'للجنسين'}</td>
                    <td>
                        <label class="toggle-switch">
                            <input type="checkbox" ${p.is_visible !== false ? 'checked' : ''} onchange="toggleVisibility('${p.id}', this.checked)">
                            <span class="slider"></span>
                        </label>
                    </td>
                    <td>
                        <button onclick="deleteProduct('${p.id}')" style="background:none; border:none; color:var(--danger); cursor:pointer; font-size:1.2em;"><i class="fas fa-trash-alt"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        // 2. تحديث حالة الظهور (إخفاء/إظهار من الموقع)
        async function toggleVisibility(id, isVisible) {
            const { error } = await supabaseClient.from('products').update({ is_visible: isVisible }).eq('id', id);
            if (error) {
                alert("حدث خطأ أثناء التحديث!");
                fetchAdminProducts(); // إعادة التحميل لإرجاع الزرار لحالته
            }
        }

        // 3. حذف منتج
        async function deleteProduct(id) {
            if(!confirm("هل أنت متأكد من حذف هذا المنتج نهائياً؟")) return;
            const { error } = await supabaseClient.from('products').delete().eq('id', id);
            if(error) alert("خطأ في الحذف: " + error.message);
            else fetchAdminProducts();
        }

        // 4. تصدير البيانات إلى إكسل (CSV)
        function exportToCSV() {
            if(allProducts.length === 0) return alert("لا توجد منتجات لتصديرها.");
            
            // تحديد الأعمدة اللي هتخرج في الملف
            const csvData = allProducts.map(p => ({
                id: p.id,
                title_ar: p.title_ar,
                title_en: p.title_en,
                price: p.price,
                image: p.image,
                season: p.season || 'all',
                gender: p.gender || 'unisex',
                is_visible: p.is_visible
            }));

            const csv = Papa.unparse(csvData);
            const blob = new Blob(["\uFEFF"+csv], { type: 'text/csv;charset=utf-8;' }); // \uFEFF لدعم العربي في الإكسل
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "products_export_" + new Date().getTime() + ".csv";
            link.click();
        }

        // 5. استيراد البيانات من إكسل (CSV) السحر الحقيقي!
        function importFromCSV(event) {
            const file = event.target.files[0];
            if (!file) return;

            document.getElementById('upload-loader').style.display = 'inline-block';

            Papa.parse(file, {
                header: true, // بيعتبر أول صف هو أسماء الأعمدة
                skipEmptyLines: true,
                complete: async function(results) {
                    const data = results.data;
                    let successCount = 0;

                    // معالجة البيانات لرفعها لـ Supabase
                    const productsToInsert = data.map(item => ({
                        title_ar: item.title_ar,
                        title_en: item.title_en || '',
                        price: parseFloat(item.price) || 0,
                        image: item.image || '',
                        season: item.season || 'all',
                        gender: item.gender || 'unisex',
                        is_visible: item.is_visible !== 'false' && item.is_visible !== 'FALSE'
                    })).filter(item => item.title_ar && item.price); // التأكد إن الاسم والسعر مش فاضيين

                    if(productsToInsert.length > 0) {
                        const { error } = await supabaseClient.from('products').insert(productsToInsert);
                        if(error) {
                            alert("حدث خطأ أثناء رفع البيانات: " + error.message);
                        } else {
                            alert(`تم رفع ${productsToInsert.length} منتج بنجاح! 🚀`);
                            fetchAdminProducts(); // تحديث الجدول
                        }
                    } else {
                        alert("الملف فارغ أو لا يحتوي على الأعمدة المطلوبة (title_ar, price).");
                    }
                    
                    document.getElementById('upload-loader').style.display = 'none';
                    event.target.value = ''; // تصفير زرار الرفع
                }
            });
        }

        // تشغيل الدالة أول ما الصفحة تفتح
        fetchAdminProducts();
    </script>
</body>
</html>
