<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>المتجر الرئيسي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { --primary: #e67e22; --bg: #f4f7f6; --card-bg: #ffffff; --text: #2d3436; --danger: #e74c3c; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--text); padding-bottom: 70px; overflow-x: hidden; }
        .main-container { max-width: 1200px; margin: 0 auto; background: #fff; min-height: 100vh; box-shadow: 0 0 20px rgba(0,0,0,0.05); }

        header { background: var(--card-bg); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #eee; }
        .logo h1 { font-size: 1.4em; color: var(--primary); font-weight: 900; margin: 0;}
        .header-actions { display: flex; align-items: center; gap: 20px; }
        .header-icon { font-size: 1.3em; cursor: pointer; color: var(--text); }
        .cart-icon { position: relative; font-size: 1.3em; cursor: pointer; }
        .cart-badge { position: absolute; top: -5px; right: -8px; background: red; color: #fff; font-size: 0.55em; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        .search-bar { padding: 15px 20px; background: #fafafa; border-bottom: 1px solid #eee; }
        .search-input-wrapper { background: #fff; border: 1px solid #ddd; border-radius: 20px; padding: 10px 15px; display: flex; align-items: center; gap: 10px; }
        .search-input-wrapper input { border: none; outline: none; width: 100%; font-family: 'Cairo'; font-size: 0.95em; }

        .categories-stories { display: flex; overflow-x: auto; padding: 15px 20px; gap: 15px; border-bottom: 1px solid #eee; scroll-behavior: smooth; }
        .categories-stories::-webkit-scrollbar { display: none; }
        .story-item { display: flex; flex-direction: column; align-items: center; gap: 5px; min-width: 75px; max-width: 85px; cursor: pointer; }
        .story-img-wrap { width: 65px; height: 65px; border-radius: 50%; padding: 2px; background: linear-gradient(45deg, var(--primary), #ff9f43); }
        .story-img { width: 100%; height: 100%; border-radius: 50%; border: 2px solid #fff; background: #eee; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.8em; color: #777; }
        .story-item span { font-size: 0.75em; font-weight: bold; text-align: center; line-height: 1.2; }

        .products-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 10px 20px 30px; }
        @media (min-width: 768px) { .products-grid { grid-template-columns: repeat(4, 1fr); gap: 20px; } .product-card { max-width: 280px; margin: 0 auto; width: 100%; } }
        
        .product-card { background: var(--card-bg); border-radius: 12px; overflow: hidden; border: 1px solid #eee; position: relative; cursor: pointer; display: flex; flex-direction: column;}
        .product-img { width: 100%; aspect-ratio: 3/4; object-fit: cover; background: #f9f9f9; }
        .product-info { padding: 12px; display: flex; flex-direction: column; flex: 1;}
        .product-title { font-size: 0.9em; font-weight: 700; height: 2.6em; overflow: hidden; margin-bottom: 5px; }
        .product-price { color: var(--primary); font-weight: 900; font-size: 1.1em; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 2000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(3px); padding: 20px; }
        .modal-content { background: var(--card-bg); width: 100%; max-width: 500px; max-height: 90vh; border-radius: 20px; overflow-y: auto; position: relative; padding: 20px; animation: scaleIn 0.3s ease; }
        @keyframes scaleIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .close-modal { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.1); border: none; width: 35px; height: 35px; border-radius: 50%; font-size: 1.2em; z-index: 10; cursor: pointer; }
        
        /* Dashboard العميل */
        .profile-header { display: flex; align-items: center; gap: 15px; padding-bottom: 15px; border-bottom: 1px solid #eee; margin-bottom: 15px;}
        .profile-avatar { width: 60px; height: 60px; border-radius: 50%; background: var(--primary); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 1.5em; font-weight: bold; overflow: hidden;}
        .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .profile-tabs { display: flex; border-bottom: 2px solid #eee; margin-bottom: 15px; }
        .profile-tab { flex: 1; text-align: center; padding: 10px; cursor: pointer; font-weight: bold; color: #888; border-bottom: 3px solid transparent; }
        .profile-tab.active { color: var(--primary); border-color: var(--primary); }
        .profile-section { display: none; } .profile-section.active { display: block; }
        .input-style { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; font-family: 'Cairo'; outline:none;}
        .btn-main { background: var(--primary); color: #fff; border: none; padding: 10px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; font-family: 'Cairo'; }
        
        /* Product Modal */
        .img-zoom-container { width: 100%; height: 350px; background: #f9f9f9; text-align: center; margin: -20px -20px 20px -20px; border-radius: 20px 20px 0 0; overflow:hidden;}
        .img-zoom-container img { height: 100%; max-width: 100%; object-fit: contain; }
        .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px;}
        .chip { border: 1px solid #ddd; padding: 8px 15px; border-radius: 8px; font-size: 0.9em; cursor: pointer; font-weight: bold;}
        .chip.selected { border-color: var(--primary); background: var(--primary); color: #fff; }
        .color-chip { width: 35px; height: 35px; border-radius: 50%; border: 2px solid #ddd; cursor: pointer; padding: 2px; }
        .color-chip.selected { border-color: var(--primary); } .color-chip span { display: block; width: 100%; height: 100%; border-radius: 50%; }

        .app-bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card-bg); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #eee; z-index: 50; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #888; font-size: 0.75em; font-weight: bold; cursor: pointer;}
        .nav-item.active { color: var(--primary); }
    </style>
</head>
<body>

    <div class="main-container">
        <header>
            <div class="logo"><h1>المتجر</h1></div>
            <div class="header-actions">
                <i class="fas fa-user header-icon" onclick="openAuthModal()"></i>
                <div class="cart-icon" onclick="window.location.href='checkout.html'"><i class="fas fa-shopping-bag"></i><span class="cart-badge" id="cart-count">0</span></div>
            </div>
        </header>

        <div class="search-bar"><div class="search-input-wrapper"><i class="fas fa-search"></i><input type="text" id="search-input" placeholder="بتبحث عن إيه؟" oninput="filterProducts()"></div></div>
        <div class="categories-stories" id="stories-container"></div>
        <h2 class="section-title" id="grid-title"><i class="fas fa-fire" style="color:var(--danger);"></i> وصل حديثاً</h2>
        <div class="products-grid" id="products-container"></div>
        <div style="height: 50px;"></div>
    </div>

    <div class="modal-overlay" id="auth-modal">
        <div class="modal-content" style="padding: 30px;">
            <button class="close-modal" onclick="document.getElementById('auth-modal').style.display='none'"><i class="fas fa-times"></i></button>
            
            <div id="login-state">
                <h2 style="color: var(--primary); font-weight: 900; text-align:center;">تسجيل الدخول</h2>
                <p style="text-align:center; color:#777; margin-bottom:20px;">لمتابعة طلباتك وإدارة حسابك</p>
                <input type="email" id="auth-email" class="input-style" placeholder="البريد الإلكتروني">
                <input type="password" id="auth-password" class="input-style" placeholder="كلمة المرور">
                <button class="btn-main" onclick="handleEmailAuth()">دخول / إنشاء حساب</button>
                <div style="text-align:center; margin:15px 0; color:#aaa;">أو</div>
                <button class="btn-main" style="background:#fff; color:#333; border:1px solid #ddd; display:flex; justify-content:center; align-items:center; gap:10px;" onclick="signInWithGoogle()">
                    <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" style="width: 20px;"> المتابعة بجوجل
                </button>
            </div>

            <div id="dashboard-state" style="display:none;">
                <div class="profile-header">
                    <div class="profile-avatar" id="user-avatar-display"><i class="fas fa-user"></i></div>
                    <div>
                        <h3 style="margin:0; color:#333;" id="user-name-display">عميلنا العزيز</h3>
                        <span style="color:#777; font-size:0.85em;" id="user-email-display"></span>
                    </div>
                </div>

                <div class="profile-tabs">
                    <div class="profile-tab active" onclick="switchTab('orders', this)">طلباتي</div>
                    <div class="profile-tab" onclick="switchTab('settings', this)">إعدادات الحساب</div>
                </div>

                <div id="tab-orders" class="profile-section active">
                    <div id="orders-list"></div>
                </div>

                <div id="tab-settings" class="profile-section">
                    <label style="font-weight:bold; font-size:0.85em; color:#555;">الاسم:</label>
                    <input type="text" id="prof-name" class="input-style">
                    <label style="font-weight:bold; font-size:0.85em; color:#555;">رابط صورة شخصية (اختياري):</label>
                    <input type="text" id="prof-avatar" class="input-style" placeholder="https://...">
                    <button class="btn-main" onclick="updateProfile()" style="margin-bottom:15px;">حفظ التعديلات</button>
                    <button class="btn-main" style="background:var(--danger);" onclick="logout()"><i class="fas fa-sign-out-alt"></i> تسجيل خروج</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="prod-modal">
        <div class="modal-content">
            <button class="close-modal" onclick="document.getElementById('prod-modal').style.display='none'"><i class="fas fa-times"></i></button>
            <div class="img-zoom-container"><img id="modal-img" src=""></div>
            <h2 id="modal-title" style="font-weight:900; font-size:1.3em; margin-bottom:5px;"></h2>
            <div class="product-price" style="font-size:1.5em; margin-bottom:15px;"><span id="modal-price"></span></div>
            
            <div id="modal-colors-section" style="display:none;"><b class="options-title">اللون:</b><div class="chips" id="modal-colors-list"></div></div>
            <div id="modal-sizes-section" style="display:none;"><b class="options-title">المقاس:</b><div class="chips" id="modal-sizes-list"></div></div>
            
            <button class="btn-main" style="margin-top:10px; font-size:1.1em; padding:12px;" onclick="addToCart()">أضف للسلة <i class="fas fa-cart-plus"></i></button>
        </div>
    </div>

    <nav class="app-bottom-nav">
        <div class="nav-item active" onclick="window.scrollTo(0,0)"><i class="fas fa-home"></i><span>الرئيسية</span></div>
        <div class="nav-item" onclick="openAuthModal()"><i class="fas fa-user"></i><span>حسابي</span></div>
        <div class="nav-item" onclick="window.location.href='checkout.html'"><i class="fas fa-shopping-cart"></i><span>السلة</span></div>
    </nav>

    <script>
        const SUPABASE_URL = 'https://wkfiocqhkspsvqgyjpea.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_l2vgR8Xbt0Csw8W_Slo_1Q_9glKlIoN'; 
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let allProducts = []; let cart = JSON.parse(localStorage.getItem('okaz_cart')) || [];
        let currentProd = null; let selectedSize = ''; let selectedColor = ''; let currentUser = null;

        async function initStore() {
            updateCartBadge();
            await checkUser();
            await fetchCategories(); 
            await fetchProducts();
            if(window.location.search.includes('login=true') && !currentUser) openAuthModal();
        }

        // --- نظام الحسابات (Dashboard) ---
        async function checkUser() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if(session) {
                currentUser = session.user;
                document.getElementById('login-state').style.display = 'none';
                document.getElementById('dashboard-state').style.display = 'block';
                document.getElementById('user-email-display').innerText = currentUser.email;
                
                const meta = currentUser.user_metadata || {};
                if(meta.full_name) { document.getElementById('user-name-display').innerText = meta.full_name; document.getElementById('prof-name').value = meta.full_name; }
                if(meta.avatar_url) { document.getElementById('user-avatar-display').innerHTML = `<img src="${meta.avatar_url}">`; document.getElementById('prof-avatar').value = meta.avatar_url; }
                
                fetchMyOrders();
            } else {
                currentUser = null;
                document.getElementById('login-state').style.display = 'block';
                document.getElementById('dashboard-state').style.display = 'none';
            }
        }

        function openAuthModal() { document.getElementById('auth-modal').style.display = 'flex'; }
        
        function switchTab(tab, el) { 
            document.querySelectorAll('.profile-tab').forEach(t=>t.classList.remove('active')); el.classList.add('active');
            document.querySelectorAll('.profile-section').forEach(s=>s.classList.remove('active')); document.getElementById('tab-'+tab).classList.add('active');
        }

        async function handleEmailAuth() {
            const e = document.getElementById('auth-email').value; const p = document.getElementById('auth-password').value;
            if(!e || p.length < 6) return alert("إيميل وباسورد 6 أحرف.");
            const { error: err1 } = await supabaseClient.auth.signInWithPassword({ email:e, password:p });
            if (err1) {
                if(err1.message.includes("Invalid login credentials")) {
                    const { error: err2 } = await supabaseClient.auth.signUp({ email:e, password:p });
                    if(!err2) { alert("تم الإنشاء!"); await checkUser(); } else alert(err2.message);
                }
            } else await checkUser();
        }

        async function signInWithGoogle() { await supabaseClient.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.href } }); }
        async function logout() { await supabaseClient.auth.signOut(); await checkUser(); }
        
        async function updateProfile() {
            const n = document.getElementById('prof-name').value; const a = document.getElementById('prof-avatar').value;
            await supabaseClient.auth.updateUser({ data: { full_name: n, avatar_url: a } });
            alert("تم التحديث بنجاح!"); await checkUser();
        }

        async function fetchMyOrders() {
            const list = document.getElementById('orders-list'); list.innerHTML = '<div style="text-align:center; color:#888;"><i class="fas fa-spinner fa-spin"></i> جاري التحميل...</div>';
            const { data } = await supabaseClient.from('orders').select('*, order_items(*)').eq('customer_email', currentUser.email).order('created_at', {ascending:false});
            if(!data || data.length === 0) { list.innerHTML = '<p style="text-align:center; color:#888;"><i class="fas fa-box-open" style="font-size:3em; margin-bottom:10px; opacity:0.5;"></i><br>لا توجد طلبات.</p>'; return; }
            list.innerHTML = data.map(o => `
                <div style="border:1px solid #eee; border-radius:10px; padding:15px; margin-bottom:15px; background:#fafafa;">
                    <div style="display:flex; justify-content:space-between; border-bottom:1px solid #ddd; padding-bottom:8px; margin-bottom:8px;">
                        <b>#OKZ-${o.id.split('-')[0].toUpperCase()}</b><span style="color:var(--primary); font-weight:bold;">${o.status}</span>
                    </div>
                    <div style="font-size:0.85em; color:#555;"><b>الإجمالي:</b> ${o.total_price} ج.م | <b>بتاريخ:</b> ${new Date(o.created_at).toLocaleDateString('ar-EG')}</div>
                    <div style="margin-top:10px; padding:10px; background:#fff; border-radius:5px; font-size:0.85em; border:1px dashed #ccc;">
                        ${(o.order_items || []).map(i => `<div style="display:flex; justify-content:space-between; margin-bottom:5px;"><span>${i.product_name} (${i.selected_size||'-'}/${i.selected_color||'-'})</span><b>x${i.quantity}</b></div>`).join('')}
                    </div>
                </div>`).join('');
        }

        // --- المتجر والمنتجات ---
        async function fetchCategories() {
            const {data} = await supabaseClient.from('categories').select('*').eq('show_on_home', true);
            const cont = document.getElementById('stories-container');
            cont.innerHTML = `<div class="story-item" onclick="renderProducts(allProducts)"><div class="story-img-wrap"><div class="story-img" style="background:var(--primary);color:#fff;">الكل</div></div><span>كل المنتجات</span></div>` + 
                             data.map(c => `<div class="story-item" onclick="filterByCategory('${c.id}')"><div class="story-img-wrap"><div class="story-img">${c.title_ar.substring(0,4)}</div></div><span>${c.title_ar}</span></div>`).join('');
        }

        async function fetchProducts() {
            const {data} = await supabaseClient.from('products').select('*').eq('is_visible', true).order('created_at', {ascending:false});
            allProducts = data || []; renderProducts(allProducts);
        }

        function renderProducts(arr) {
            document.getElementById('products-container').innerHTML = arr.map(p => `<div class="product-card" onclick="openProduct('${p.id}')"><img class="product-img" src="${p.image}"><div class="product-info"><div class="product-title">${p.title_ar}</div><div class="product-price">${p.price} ج.م</div></div></div>`).join('');
        }
        function filterProducts() { const q = document.getElementById('search-input').value.toLowerCase(); renderProducts(allProducts.filter(p => p.title_ar.toLowerCase().includes(q))); }
        function filterByCategory(id) { renderProducts(allProducts.filter(p => p.category_id === id)); }

        async function openProduct(id) {
            currentProd = allProducts.find(x => x.id === id); selectedSize = ''; selectedColor = '';
            document.getElementById('modal-img').src = currentProd.image; document.getElementById('modal-title').innerText = currentProd.title_ar; document.getElementById('modal-price').innerText = currentProd.price + " ج.م";
            const [sz, cl] = await Promise.all([supabaseClient.from('product_sizes').select('*').eq('product_id', id), supabaseClient.from('product_colors').select('*').eq('product_id', id)]);
            if(cl.data.length > 0) { document.getElementById('modal-colors-section').style.display='block'; document.getElementById('modal-colors-list').innerHTML = cl.data.map(c => `<div class="color-chip" style="background:${c.color_hex};" onclick="selectColor(this, '${c.color_name_ar}', '${c.image_url}')"><span></span></div>`).join(''); } else document.getElementById('modal-colors-section').style.display='none';
            if(sz.data.length > 0) { document.getElementById('modal-sizes-section').style.display='block'; document.getElementById('modal-sizes-list').innerHTML = sz.data.map(s => `<div class="chip" onclick="selectSize(this, '${s.size_name}')">${s.size_name}</div>`).join(''); } else document.getElementById('modal-sizes-section').style.display='none';
            document.getElementById('prod-modal').style.display = 'flex';
        }
        
        function selectSize(el, val) { document.querySelectorAll('#modal-sizes-list .chip').forEach(c=>c.classList.remove('selected')); el.classList.add('selected'); selectedSize = val; }
        function selectColor(el, val, img) { document.querySelectorAll('#modal-colors-list .color-chip').forEach(c=>c.classList.remove('selected')); el.classList.add('selected'); selectedColor = val; if(img) document.getElementById('modal-img').src = img; }

        function addToCart() {
            if(document.getElementById('modal-sizes-section').style.display === 'block' && !selectedSize) return alert("اختر المقاس.");
            if(document.getElementById('modal-colors-section').style.display === 'block' && !selectedColor) return alert("اختر اللون.");
            const cartId = currentProd.id + selectedSize + selectedColor; const exist = cart.find(x => x.id === cartId);
            if(exist) exist.qty++; else cart.push({ id: cartId, code: currentProd.product_code||'-', title: currentProd.title_ar, price: currentProd.price, image: document.getElementById('modal-img').src, size: selectedSize, color: selectedColor, qty: 1 });
            localStorage.setItem('okaz_cart', JSON.stringify(cart)); updateCartBadge(); document.getElementById('prod-modal').style.display = 'none';
        }
        function updateCartBadge() { document.getElementById('cart-count').innerText = cart.reduce((s, i) => s + i.qty, 0); }

        initStore();
    </script>
</body>
</html>
