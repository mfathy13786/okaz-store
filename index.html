<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>المتجر الرئيسي</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { --primary: #e67e22; --bg: #f4f7f6; --card-bg: #ffffff; --text: #2d3436; --danger: #e74c3c; --success: #27ae60; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--text); padding-bottom: 70px; overflow-x: hidden; }
        .main-container { max-width: 1200px; margin: 0 auto; background: #fff; min-height: 100vh; box-shadow: 0 0 20px rgba(0,0,0,0.05); }

        #announcement-bar { background: var(--primary); color: #fff; text-align: center; padding: 8px; font-size: 0.85em; font-weight: bold; display: none; }

        header { background: var(--card-bg); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #eee; }
        .logo h1 { font-size: 1.4em; color: var(--primary); font-weight: 900; margin: 0;}
        .header-actions { display: flex; align-items: center; gap: 20px; }
        .header-icon { font-size: 1.3em; cursor: pointer; color: var(--text); }
        .cart-icon { position: relative; font-size: 1.3em; cursor: pointer; }
        .cart-badge { position: absolute; top: -5px; right: -8px; background: red; color: #fff; font-size: 0.55em; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        .search-bar { padding: 15px 20px; background: #fafafa; border-bottom: 1px solid #eee; }
        .search-input-wrapper { background: #fff; border: 1px solid #ddd; border-radius: 20px; padding: 10px 15px; display: flex; align-items: center; gap: 10px; }
        .search-input-wrapper input { border: none; outline: none; width: 100%; font-family: 'Cairo'; font-size: 0.95em; }

        .categories-stories { display: flex; overflow-x: auto; padding: 15px 20px; gap: 15px; border-bottom: 1px solid #eee; scroll-behavior: smooth; }
        .categories-stories::-webkit-scrollbar { display: none; }
        .story-item { display: flex; flex-direction: column; align-items: center; gap: 5px; min-width: 75px; max-width: 85px; cursor: pointer; }
        .story-img-wrap { width: 65px; height: 65px; border-radius: 50%; padding: 2px; background: linear-gradient(45deg, var(--primary), #ff9f43); }
        .story-img { width: 100%; height: 100%; border-radius: 50%; border: 2px solid #fff; background: #eee; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.8em; color: #777; }
        .story-item span { font-size: 0.75em; font-weight: bold; text-align: center; line-height: 1.2; }

        .banner-slider { width: 100%; display: none; background: #eee; }
        .swiper-slide img { width: 100%; height: auto; max-height: 400px; object-fit: cover; display: block; }
        .static-banner { margin: 20px; border-radius: 15px; overflow: hidden; display: none; }
        .static-banner img { width: 100%; display: block; object-fit: cover; max-height: 300px; }

        .section-title { padding: 20px 20px 10px; font-size: 1.2em; font-weight: 900; display: flex; align-items: center; gap: 8px; }
        
        .products-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 10px 20px 30px; }
        @media (min-width: 768px) { .products-grid { grid-template-columns: repeat(4, 1fr); gap: 20px; } .product-card { max-width: 280px; margin: 0 auto; width: 100%; } }
        
        .product-card { background: var(--card-bg); border-radius: 12px; overflow: hidden; border: 1px solid #eee; cursor: pointer; display: flex; flex-direction: column;}
        .product-img { width: 100%; aspect-ratio: 3/4; object-fit: cover; background: #f9f9f9; }
        .product-info { padding: 12px; display: flex; flex-direction: column; flex: 1;}
        .product-title { font-size: 0.9em; font-weight: 700; height: 2.6em; overflow: hidden; margin-bottom: 5px; }
        .product-price { color: var(--primary); font-weight: 900; font-size: 1.1em; }

        /* مودال عام */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 2000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(3px); padding: 20px; }
        .modal-content { background: var(--card-bg); width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; border-radius: 20px; padding: 25px; position: relative; animation: scaleIn 0.3s ease; }
        @keyframes scaleIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .close-modal { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.1); border: none; width: 35px; height: 35px; border-radius: 50%; font-size: 1.2em; z-index: 10; cursor: pointer; }
        
        /* لوحة تحكم العميل الاحترافية */
        .profile-header { display: flex; align-items: center; gap: 15px; padding-bottom: 15px; border-bottom: 1px solid #eee; margin-bottom: 15px;}
        .profile-avatar { width: 65px; height: 65px; border-radius: 50%; background: #eee; color: #aaa; display: flex; align-items: center; justify-content: center; font-size: 2em; overflow: hidden; border: 2px solid var(--primary); position: relative;}
        .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
        
        .profile-tabs { display: flex; border-bottom: 2px solid #eee; margin-bottom: 20px; }
        .profile-tab { flex: 1; text-align: center; padding: 12px; cursor: pointer; font-weight: bold; color: #888; border-bottom: 3px solid transparent; transition: 0.3s;}
        .profile-tab.active { color: var(--primary); border-color: var(--primary); }
        .profile-section { display: none; animation: fadeIn 0.3s ease;} .profile-section.active { display: block; }
        @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
        
        .input-group { margin-bottom: 15px; text-align: right; }
        .input-group label { display: block; margin-bottom: 5px; font-size: 0.85em; font-weight: bold; color: #555; }
        .input-style { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-family: 'Cairo'; outline: none; background: #fafafa;}
        .input-style:focus { border-color: var(--primary); background: #fff;}
        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        @media(max-width: 500px) { .settings-grid { grid-template-columns: 1fr; } }

        .btn-main { background: var(--primary); color: #fff; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; font-family: 'Cairo'; font-size: 1em; transition: 0.2s;}
        .btn-gps { background: #3498db; color: #fff; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-family: 'Cairo'; font-weight: bold; width: 100%; margin-top: 5px; display: flex; align-items: center; justify-content: center; gap: 8px;}
        .btn-upload { background: #eee; color: #333; border: 1px dashed #aaa; padding: 10px; border-radius: 8px; cursor: pointer; font-family: 'Cairo'; width: 100%; margin-top: 5px; font-weight: bold;}

        /* Product Modal */
        .img-zoom-container { width: 100%; height: 350px; background: #f9f9f9; text-align: center; margin: -25px -25px 20px -25px; border-radius: 20px 20px 0 0; overflow:hidden;}
        .img-zoom-container img { height: 100%; max-width: 100%; object-fit: contain; }
        .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px;}
        .chip { border: 1px solid #ddd; padding: 8px 15px; border-radius: 8px; font-size: 0.9em; cursor: pointer; font-weight: bold;}
        .chip.selected { border-color: var(--primary); background: var(--primary); color: #fff; }
        .color-chip { width: 35px; height: 35px; border-radius: 50%; border: 2px solid #ddd; cursor: pointer; padding: 2px; }
        .color-chip.selected { border-color: var(--primary); } .color-chip span { display: block; width: 100%; height: 100%; border-radius: 50%; }

        .app-bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card-bg); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #eee; z-index: 50; max-width: 1200px; margin: 0 auto;}
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #888; font-size: 0.75em; font-weight: bold; cursor: pointer;}
        .nav-item.active { color: var(--primary); }
    </style>
</head>
<body>

    <div class="main-container">
        <div id="announcement-bar"></div>

        <header>
            <div class="logo" id="site-logo"><h1>المتجر</h1></div>
            <div class="header-actions">
                <i class="fas fa-user header-icon" onclick="openAuthModal()"></i>
                <div class="cart-icon" onclick="window.location.href='checkout.html'"><i class="fas fa-shopping-bag"></i><span class="cart-badge" id="cart-count">0</span></div>
            </div>
        </header>

        <div class="search-bar"><div class="search-input-wrapper"><i class="fas fa-search" style="color:#aaa;"></i><input type="text" id="search-input" placeholder="بتبحث عن إيه؟" oninput="filterProducts()"></div></div>
        
        <div class="categories-stories" id="stories-container"></div>
        <div class="swiper banner-slider" id="top-slider"><div class="swiper-wrapper" id="top-slider-wrapper"></div><div class="swiper-pagination"></div></div>
        
        <h2 class="section-title" id="grid-title"><i class="fas fa-fire" style="color:var(--danger);"></i> وصل حديثاً</h2>
        
        <div class="products-grid" id="products-container">
            <div style="grid-column: 1/-1; text-align:center; padding:50px; color:#888;"><i class="fas fa-spinner fa-spin" style="font-size:2em;"></i><br>جاري تحميل المنتجات...</div>
        </div>

        <div class="static-banner" id="middle-banner"></div>
        <div class="static-banner" id="bottom-banner"></div>
        <div style="height: 60px;"></div>
    </div>

    <nav class="app-bottom-nav">
        <div class="nav-item active" onclick="window.scrollTo(0,0)"><i class="fas fa-home"></i><span>الرئيسية</span></div>
        <div class="nav-item" onclick="document.getElementById('search-input').focus()"><i class="fas fa-search"></i><span>بحث</span></div>
        <div class="nav-item" onclick="openAuthModal()"><i class="fas fa-user"></i><span>حسابي</span></div>
        <div class="nav-item" onclick="window.location.href='checkout.html'"><i class="fas fa-shopping-cart"></i><span>السلة</span></div>
    </nav>

    <div class="modal-overlay" id="auth-modal">
        <div class="modal-content">
            <button class="close-modal" onclick="document.getElementById('auth-modal').style.display='none'"><i class="fas fa-times"></i></button>
            
            <div id="login-state">
                <h2 style="color: var(--primary); font-weight: 900; text-align:center; margin-bottom:5px;">تسجيل الدخول</h2>
                <p style="text-align:center; color:#777; margin-bottom:20px; font-size:0.9em;">لتتبع طلباتك وحفظ بيانات الشحن</p>
                <div class="input-group"><input type="email" id="auth-email" class="input-style" placeholder="البريد الإلكتروني"></div>
                <div class="input-group"><input type="password" id="auth-password" class="input-style" placeholder="كلمة المرور (6 أحرف على الأقل)"></div>
                <button class="btn-main" onclick="handleEmailAuth()">دخول / إنشاء حساب</button>
                <div class="divider">أو</div>
                <button class="btn-main" style="background: #fff; color: #333; border: 1px solid #ddd;" onclick="signInWithGoogle()">
                    <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" style="width: 22px;"> المتابعة باستخدام جوجل
                </button>
            </div>
            
            <div id="dashboard-state" style="display: none;">
                <div class="profile-header">
                    <div class="profile-avatar" id="user-avatar-display"><i class="fas fa-user"></i></div>
                    <div>
                        <h3 style="margin:0; color:#333; font-weight:900;" id="user-name-display">عميلنا العزيز</h3>
                        <span style="color:#777; font-size:0.85em;" id="user-email-display"></span>
                    </div>
                </div>
                
                <div class="profile-tabs">
                    <div class="profile-tab active" onclick="switchProfileTab('orders-tab', this)"><i class="fas fa-box"></i> طلباتي</div>
                    <div class="profile-tab" onclick="switchProfileTab('settings-tab', this)"><i class="fas fa-cog"></i> إعداداتي</div>
                </div>

                <div id="orders-tab" class="profile-section active">
                    <div id="my-orders-list"></div>
                </div>

                <div id="settings-tab" class="profile-section">
                    <div style="background:#fff3e0; color:#d35400; padding:10px; border-radius:8px; font-size:0.85em; font-weight:bold; margin-bottom:15px; text-align:center;">
                        هذه البيانات سيتم ملؤها تلقائياً عند الشراء.
                    </div>
                    
                    <div style="text-align:center; margin-bottom:15px;">
                        <input type="file" id="prof-avatar-file" accept="image/*" style="display:none;" onchange="previewAvatar(this)">
                        <button class="btn-upload" onclick="document.getElementById('prof-avatar-file').click()"><i class="fas fa-camera"></i> تغيير الصورة الشخصية</button>
                    </div>

                    <div class="settings-grid">
                        <div class="input-group"><label>الاسم بالكامل</label><input type="text" id="prof-name" class="input-style" placeholder="الاسم الثلاثي"></div>
                        <div class="input-group"><label>رقم الهاتف</label><input type="tel" id="prof-phone" class="input-style" placeholder="01xxxxxxxxx"></div>
                    </div>

                    <div class="input-group"><label>المحافظة الافتراضية</label><select id="prof-city" class="input-style"><option value="">-- اختر المحافظة --</option></select></div>
                    <div class="input-group"><label>العنوان بالتفصيل</label><textarea id="prof-address" class="input-style" rows="2" placeholder="الشارع، العمارة، الشقة..."></textarea></div>
                    
                    <div class="input-group">
                        <label>رابط موقعك (Google Maps)</label>
                        <input type="text" id="prof-location" class="input-style" placeholder="يستخدم لتسهيل وصول المندوب" readonly style="background:#eee;">
                        <button class="btn-gps" id="btn-gps" onclick="getCurrentLocation()"><i class="fas fa-map-marker-alt"></i> تحديد موقعي الحالي تلقائياً</button>
                    </div>

                    <button class="btn-main" onclick="updateProfile()" style="margin-top:10px;"><i class="fas fa-save"></i> حفظ التعديلات</button>
                    <button class="btn-main" style="background: #fff; color: var(--danger); border: 1px solid var(--danger); margin-top:10px;" onclick="logout()"><i class="fas fa-sign-out-alt"></i> خروج</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="prod-modal">
        <div class="modal-content">
            <button class="close-modal" onclick="document.getElementById('prod-modal').style.display='none'"><i class="fas fa-times"></i></button>
            <div class="img-zoom-container"><img id="modal-img" src=""></div>
            <p id="modal-promo" style="color: var(--primary); font-weight: bold; font-size: 0.9em; margin-bottom: 5px;"></p>
            <h2 id="modal-title" style="font-weight:900; font-size:1.3em; margin-bottom:5px;"></h2>
            <div class="product-price" style="font-size:1.5em; margin-bottom:15px;"><span id="modal-price"></span> <span class="old-price" id="modal-old-price"></span></div>
            
            <div id="modal-colors-section" style="display:none;"><b class="options-title">اللون:</b><div class="chips" id="modal-colors-list"></div></div>
            <div id="modal-sizes-section" style="display:none;"><b class="options-title">المقاس:</b><div class="chips" id="modal-sizes-list"></div></div>
            
            <button class="btn-main" style="margin-top:15px; font-size:1.1em; padding:15px;" onclick="addToCart()">أضف للسلة <i class="fas fa-cart-plus"></i></button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://wkfiocqhkspsvqgyjpea.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_l2vgR8Xbt0Csw8W_Slo_1Q_9glKlIoN'; 
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let systemSettings = {};
        let allProducts = [];
        let cart = JSON.parse(localStorage.getItem('okaz_cart')) || [];
        let currentProd = null; let selectedSize = ''; let selectedColor = '';
        let currentUser = null;

        // دالة التهيئة الأساسية (تأكدنا إن المنتجات بتتحمل في كل الأحوال)
        async function initStore() {
            updateCartBadge();
            fetchCitiesForProfile();
            await fetchSettings(); 
            await fetchCategories(); 
            await fetchProducts(); // جلب المنتجات فوراً بغض النظر عن الحساب
            await fetchBanners();
            await checkUser(); // فحص الحساب في الخلفية
            
            if(window.location.search.includes('login=true') && !currentUser) openAuthModal();
        }

        async function fetchCitiesForProfile() {
            const { data } = await supabaseClient.from('shipping_rules').select('city_ar').order('city_ar');
            const citySelect = document.getElementById('prof-city');
            if(data && citySelect) {
                data.forEach(c => { citySelect.innerHTML += `<option value="${c.city_ar}">${c.city_ar}</option>`; });
            }
        }

        // --- نظام الحسابات وإدارة العميل ---
        async function checkUser() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if(session) {
                currentUser = session.user;
                document.getElementById('login-state').style.display = 'none';
                document.getElementById('dashboard-state').style.display = 'block';
                document.getElementById('user-email-display').innerText = currentUser.email;
                
                // سحب بيانات الميتا (اسم وصورة جوجل أو البيانات المحفوظة)
                const meta = currentUser.user_metadata || {};
                const name = meta.full_name || meta.name || 'عميلنا العزيز';
                const avatar = meta.avatar_url || meta.picture || '';

                document.getElementById('user-name-display').innerText = name;
                document.getElementById('prof-name').value = name;
                if(avatar) {
                    document.getElementById('user-avatar-display').innerHTML = `<img src="${avatar}">`;
                }
                
                if(meta.phone) document.getElementById('prof-phone').value = meta.phone;
                if(meta.city) document.getElementById('prof-city').value = meta.city;
                if(meta.address) document.getElementById('prof-address').value = meta.address;
                if(meta.location_url) document.getElementById('prof-location').value = meta.location_url;
                
                fetchMyOrders();
            } else {
                currentUser = null;
                document.getElementById('login-state').style.display = 'block';
                document.getElementById('dashboard-state').style.display = 'none';
            }
        }

        function openAuthModal() { document.getElementById('auth-modal').style.display = 'flex'; }
        
        function switchProfileTab(tabId, element) {
            document.querySelectorAll('.profile-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.profile-section').forEach(c => c.classList.remove('active'));
            element.classList.add('active');
            document.getElementById(tabId).classList.add('active');
        }

        // زرار تحديد الموقع بالـ GPS
        function getCurrentLocation() {
            const btn = document.getElementById('btn-gps');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري تحديد الإحداثيات...';
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const lat = position.coords.latitude;
                        const lon = position.coords.longitude;
                        document.getElementById('prof-location').value = `https://maps.google.com/?q=${lat},${lon}`;
                        btn.innerHTML = '<i class="fas fa-check"></i> تم التقاط الموقع بنجاح';
                        btn.style.background = 'var(--success)';
                    }, 
                    (error) => {
                        alert("تعذر الوصول للموقع. تأكد من تفعيل الـ GPS (الموقع) في هاتفك ومنح الصلاحية للمتصفح.");
                        btn.innerHTML = '<i class="fas fa-map-marker-alt"></i> تحديد موقعي الحالي تلقائياً';
                    }
                );
            } else {
                alert("متصفحك لا يدعم هذه الخاصية.");
                btn.innerHTML = '<i class="fas fa-map-marker-alt"></i> تحديد موقعي الحالي تلقائياً';
            }
        }

        function previewAvatar(input) {
            if(input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) { document.getElementById('user-avatar-display').innerHTML = `<img src="${e.target.result}">`; }
                reader.readAsDataURL(input.files[0]);
            }
        }

        // تحديث ورفع الصورة والبيانات
        async function updateProfile() {
            const btn = event.target;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الحفظ...';
            btn.disabled = true;

            let finalAvatarUrl = currentUser.user_metadata?.avatar_url || '';
            const fileInput = document.getElementById('prof-avatar-file');
            
            // لو العميل اختار صورة جديدة، نرفعها
            if(fileInput.files.length > 0) {
                const file = fileInput.files[0];
                const ext = file.name.split('.').pop();
                const fileName = `avatar_${currentUser.id}_${Date.now()}.${ext}`;
                const { error: uploadErr } = await supabaseClient.storage.from('okaz_images').upload(fileName, file);
                if(!uploadErr) {
                    finalAvatarUrl = supabaseClient.storage.from('okaz_images').getPublicUrl(fileName).data.publicUrl;
                }
            }

            const updates = {
                full_name: document.getElementById('prof-name').value,
                phone: document.getElementById('prof-phone').value,
                city: document.getElementById('prof-city').value,
                address: document.getElementById('prof-address').value,
                location_url: document.getElementById('prof-location').value,
                avatar_url: finalAvatarUrl
            };

            const { error } = await supabaseClient.auth.updateUser({ data: updates });
            
            if(error) alert("حدث خطأ: " + error.message);
            else { 
                alert("تم حفظ بياناتك بنجاح! سيتم استخدامها في طلباتك القادمة."); 
                await checkUser(); 
            }
            
            btn.innerHTML = '<i class="fas fa-save"></i> حفظ التعديلات';
            btn.disabled = false;
        }

        // جلب الطلبات للإيميل
        async function fetchMyOrders() {
            if(!currentUser) return;
            const list = document.getElementById('my-orders-list');
            list.innerHTML = '<div style="text-align:center; padding: 20px;"><i class="fas fa-spinner fa-spin" style="font-size:2em; color:var(--primary);"></i><br>جاري جلب طلباتك...</div>';
            
            const { data, error } = await supabaseClient.from('orders').select('*, order_items(*)').eq('customer_email', currentUser.email).order('created_at', { ascending: false });
            
            if (error || !data || data.length === 0) {
                list.innerHTML = '<div style="text-align:center; padding: 30px; color:#888;"><i class="fas fa-box-open" style="font-size:3em; margin-bottom:10px; opacity:0.5;"></i><br>لم تقم بأي طلبات باستخدام هذا الحساب حتى الآن.</div>';
                return;
            }
            
            list.innerHTML = data.map(o => {
                let statusColor = '#f39c12'; let statusIcon = 'fa-clock';
                if(o.status === 'تم التوصيل') { statusColor = '#27ae60'; statusIcon = 'fa-check-circle'; }
                if(o.status === 'ملغي' || o.status === 'مرتجع') { statusColor = '#e74c3c'; statusIcon = 'fa-times-circle'; }
                
                const date = new Date(o.created_at).toLocaleDateString('ar-EG');
                
                return `
                <div style="background:#fff; border:1px solid #eee; border-radius:10px; padding:15px; margin-bottom:15px; box-shadow:0 2px 5px rgba(0,0,0,0.02);">
                    <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px dashed #ddd; padding-bottom:10px; margin-bottom:10px;">
                        <b style="color:var(--primary);">#OKZ-${o.id.split('-')[0].toUpperCase()}</b>
                        <span style="background:${statusColor}22; color:${statusColor}; padding:5px 10px; border-radius:20px; font-size:0.8em; font-weight:bold;"><i class="fas ${statusIcon}"></i> ${o.status}</span>
                    </div>
                    <div style="font-size:0.85em; color:#555; margin-bottom:10px;">
                        <b>التاريخ:</b> ${date} <br>
                        <b>الإجمالي:</b> <span style="color:#000; font-weight:bold;">${o.grand_total || o.total_price || 0} ج.م</span>
                    </div>
                    <div style="background:#f9f9f9; padding:10px; border-radius:8px; font-size:0.8em; border: 1px solid #eee;">
                        <b style="display:block; margin-bottom:5px; color:var(--primary);">المنتجات المشتراة:</b>
                        ${(o.order_items || o.items || []).map(i => `
                            <div style="display:flex; justify-content:space-between; margin-bottom:3px; border-bottom:1px dashed #e1e1e1; padding-bottom:3px;">
                                <span>${i.product_name || i.title} (${i.selected_size||'-'}/${i.selected_color||'-'})</span>
                                <b>x${i.quantity || i.qty}</b>
                            </div>
                        `).join('')}
                    </div>
                </div>`;
            }).join('');
        }

        async function handleEmailAuth() {
            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-password').value.trim();
            if(!email || password.length < 6) return alert("يرجى إدخال إيميل صحيح وكلمة مرور لا تقل عن 6 أحرف.");
            const { error: err1 } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (err1 && err1.message.includes("Invalid login credentials")) {
                const { error: err2 } = await supabaseClient.auth.signUp({ email, password });
                if(!err2) { alert("تم إنشاء الحساب بنجاح!"); await checkUser(); } else alert(err2.message);
            } else if(!err1) { await checkUser(); }
        }

        async function signInWithGoogle() {
            const { error } = await supabaseClient.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.href } });
            if (error) alert("خطأ: " + error.message);
        }

        async function logout() { await supabaseClient.auth.signOut(); await checkUser(); }

        // --- المتجر وعرض المنتجات ---
        async function fetchSettings() {
            const {data} = await supabaseClient.from('store_settings').select('*');
            if(data) data.forEach(s => systemSettings[s.setting_key] = s.setting_value);
            if(systemSettings.theme_color) document.documentElement.style.setProperty('--primary', systemSettings.theme_color);
            if(systemSettings.site_logo_header) document.getElementById('site-logo').innerHTML = `<img src="${systemSettings.site_logo_header}">`;
            if(systemSettings.announcement_text) { document.getElementById('announcement-bar').innerText = systemSettings.announcement_text; document.getElementById('announcement-bar').style.display = 'block'; }
        }

        async function fetchCategories() {
            const {data} = await supabaseClient.from('categories').select('*').eq('show_on_home', true);
            const cont = document.getElementById('stories-container');
            if(data) {
                cont.innerHTML = `<div class="story-item" onclick="renderProducts(allProducts)"><div class="story-img-wrap"><div class="story-img" style="background:var(--primary);color:#fff;">الكل</div></div><span>كل المنتجات</span></div>` + 
                             data.map(c => `<div class="story-item" onclick="filterByCategory('${c.id}', '${c.title_ar}')"><div class="story-img-wrap"><div class="story-img">${c.title_ar.substring(0,4)}</div></div><span>${c.title_ar}</span></div>`).join('');
            }
        }

        async function fetchBanners() {
            const {data} = await supabaseClient.from('store_banners').select('*').eq('is_active', true);
            if(!data) return;
            data.forEach(b => {
                if(b.images && b.images.length > 0) {
                    if(b.position_name === 'top') {
                        document.getElementById('top-slider').style.display = 'block';
                        document.getElementById('top-slider-wrapper').innerHTML = b.images.map(img => `<div class="swiper-slide"><img src="${img}"></div>`).join('');
                        new Swiper('#top-slider', { loop: true, autoplay: { delay: 3500 }, pagination: { el: '.swiper-pagination' } });
                    }
                }
            });
        }

        async function fetchProducts() {
            const {data} = await supabaseClient.from('products').select('*').eq('is_visible', true).order('created_at', {ascending:false});
            allProducts = data || []; 
            renderProducts(allProducts);
        }

        function renderProducts(arr) {
            const cont = document.getElementById('products-container');
            if(arr.length === 0) { cont.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:50px; color:#888;"><i class="fas fa-box-open" style="font-size:3em; margin-bottom:10px; opacity:0.5;"></i><br>لا توجد منتجات حالياً.</div>'; return; }
            cont.innerHTML = arr.map(p => {
                const badge = (p.badge_ar && p.badge_ar !== 'لا يوجد') ? `<div class="product-badge">${p.badge_ar}</div>` : '';
                const oldPrice = p.old_price > p.price ? `<span class="old-price">${p.old_price}</span>` : '';
                return `<div class="product-card" onclick="openProduct('${p.id}')">${badge}<img class="product-img" src="${p.image||'https://via.placeholder.com/300'}"><div class="product-info"><div class="product-title">${p.title_ar}</div><div class="product-price">${p.price} ج.م ${oldPrice}</div></div></div>`;
            }).join('');
        }

        function filterProducts() { const q = document.getElementById('search-input').value.toLowerCase().trim(); document.getElementById('grid-title').innerHTML = q ? '<i class="fas fa-search"></i> نتائج البحث' : '<i class="fas fa-fire"></i> وصل حديثاً'; renderProducts(allProducts.filter(p => p.title_ar.toLowerCase().includes(q))); }
        function filterByCategory(id, title) { document.getElementById('grid-title').innerHTML = `<i class="fas fa-list"></i> ${title}`; renderProducts(allProducts.filter(p => p.category_id === id)); }
        
        async function openProduct(id) {
            currentProd = allProducts.find(x => x.id === id); selectedSize = ''; selectedColor = '';
            document.getElementById('modal-img').src = currentProd.image || 'https://via.placeholder.com/400';
            document.getElementById('modal-title').innerText = currentProd.title_ar;
            document.getElementById('modal-price').innerText = `${currentProd.price} ج.م`;
            document.getElementById('modal-old-price').innerText = currentProd.old_price > currentProd.price ? currentProd.old_price : '';
            document.getElementById('modal-promo').innerText = currentProd.promo_message || '';
            
            const [sz, cl] = await Promise.all([supabaseClient.from('product_sizes').select('*').eq('product_id', id), supabaseClient.from('product_colors').select('*').eq('product_id', id)]);
            
            const cSec = document.getElementById('modal-colors-section');
            if(cl.data && cl.data.length > 0) { cSec.style.display = 'block'; document.getElementById('modal-colors-list').innerHTML = cl.data.map(c => `<div class="color-chip" style="background:${c.color_hex};" onclick="selectColor(this, '${c.color_name_ar}', '${c.image_url}')"><span></span></div>`).join(''); } else { cSec.style.display = 'none'; }
            
            const sSec = document.getElementById('modal-sizes-section');
            if(sz.data && sz.data.length > 0) { sSec.style.display = 'block'; document.getElementById('modal-sizes-list').innerHTML = sz.data.map(s => `<div class="chip" onclick="selectSize(this, '${s.size_name}')">${s.size_name}</div>`).join(''); } else { sSec.style.display = 'none'; }

            document.getElementById('prod-modal').style.display = 'flex';
        }
        
        function selectSize(el, val) { document.querySelectorAll('#modal-sizes-list .chip').forEach(c=>c.classList.remove('selected')); el.classList.add('selected'); selectedSize = val; }
        function selectColor(el, val, img) { document.querySelectorAll('#modal-colors-list .color-chip').forEach(c=>c.classList.remove('selected')); el.classList.add('selected'); selectedColor = val; if(img) document.getElementById('modal-img').src = img; }
        function closeModal() { document.getElementById('prod-modal').style.display = 'none'; }

        function addToCart() {
            if(document.getElementById('modal-sizes-section').style.display === 'block' && !selectedSize) return alert("اختر المقاس أولاً.");
            if(document.getElementById('modal-colors-section').style.display === 'block' && !selectedColor) return alert("اختر اللون أولاً.");
            const cartId = currentProd.id + selectedSize + selectedColor; const exist = cart.find(x => x.id === cartId);
            if(exist) exist.qty++; else cart.push({ id: cartId, code: currentProd.product_code||'-', title: currentProd.title_ar, price: currentProd.price, image: document.getElementById('modal-img').src, size: selectedSize, color: selectedColor, qty: 1 });
            localStorage.setItem('okaz_cart', JSON.stringify(cart)); updateCartBadge(); closeModal(); toggleCart();
        }
        
        function updateCartBadge() { document.getElementById('cart-count').innerText = cart.reduce((s, i) => s + i.qty, 0); }
        function toggleCart() { const d = document.getElementById('cart-drawer'); const o = document.getElementById('cart-overlay'); if(d.classList.contains('open')) { d.classList.remove('open'); o.classList.remove('open'); } else { renderCart(); d.classList.add('open'); o.classList.add('open'); } }
        
        function renderCart() {
            const cont = document.getElementById('cart-items-list');
            if(cart.length === 0) { cont.innerHTML = `<div style="text-align:center; color:#aaa; margin-top:50px;">السلة فارغة</div>`; document.getElementById('cart-total-price').innerText = `0 ج.م`; return; }
            let total = 0; 
            cont.innerHTML = cart.map((item, idx) => { 
                total += (item.price * item.qty); 
                return `<div class="cart-item"><img src="${item.image}"><div style="flex:1;"><b style="color:#2d3436; font-size:0.9em;">${item.title}</b><br><small style="color:#777;">${item.size||''} ${item.color||''}</small><br><b style="color:var(--primary);">${item.price} ج.م</b></div><div style="display:flex;flex-direction:column;align-items:center;gap:8px;"><button style="background:#eee; border:none; padding:5px 10px; border-radius:5px; cursor:pointer;" onclick="updateQty(${idx}, 1)">+</button> <b style="color:#000;">${item.qty}</b> <button style="background:#eee; border:none; padding:5px 10px; border-radius:5px; cursor:pointer;" onclick="updateQty(${idx}, -1)">-</button></div></div>`; 
            }).join(''); 
            document.getElementById('cart-total-price').innerText = `${total} ج.م`;
        }
        function updateQty(idx, val) { cart[idx].qty += val; if(cart[idx].qty <= 0) cart.splice(idx, 1); localStorage.setItem('okaz_cart', JSON.stringify(cart)); updateCartBadge(); renderCart(); }

        initStore();
    </script>
</body>
</html>
